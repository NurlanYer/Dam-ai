<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dam-ai — Бильярдная Тренировка</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #0d0f12; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        .hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .header { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; }
        .btn { background: rgba(0, 0, 0, 0.75); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 18px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 5px; text-decoration: none; }
        .btn-calib { border-color: rgba(0, 255, 102, 0.4); color: #00ff66; font-weight: 600; }
        .btn-calib.active-mode { background: #00ff66; color: #000; border-color: #00ff66; }
        .hint { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.85); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; text-align: center; white-space: nowrap; }
        #settings-panel { display: none; position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 360px; background: #131714; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 20px; flex-direction: column; gap: 15px; }
        .setting-item { display: flex; flex-direction: column; gap: 8px; }
        .setting-item label { color: #aaa; font-size: 0.85rem; text-transform: uppercase; }
        .color-options { display: flex; gap: 12px; }
        .color-dot { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-dot.active { border-color: #fff; transform: scale(1.1); }
        input[type=range] { width: 100%; background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; outline: none; -webkit-appearance: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #00ff66; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>
    <canvas id="canvas-layer"></canvas>

    <div class="hud">
        <div class="header">
            <a href="./" class="btn interactive">← Меню</a>
            <button class="btn btn-calib interactive" id="btn-calibrate">📐 <span id="txt-calib">Разметка стола</span></button>
            <button class="btn interactive" id="btn-settings">⚙️</button>
        </div>

        <div id="settings-panel" class="interactive">
            <div class="setting-item">
                <label>Цвет лазера</label>
                <div class="color-options">
                    <div class="color-dot active" style="background: #00ff66;" data-color="#00ff66"></div>
                    <div class="color-dot" style="background: #ff3333;" data-color="#ff3333"></div>
                    <div class="color-dot" style="background: #3388ff;" data-color="#3388ff"></div>
                </div>
            </div>
            <div class="setting-item">
                <label>Толщина луча</label>
                <input type="range" min="1" max="10" value="3" id="slider-thickness">
            </div>
            <div class="setting-item">
                <label>Длина луча</label>
                <input type="range" min="100" max="1500" value="600" id="slider-length">
            </div>
        </div>

        <div class="hint" id="txt-hint">Тапните на биток и тяните в сторону для прицеливания</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas-layer');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('webcam');
        
        let laserColor = "#00ff66";
        let laserThickness = 3;
        let maxLaserLength = 600;
        let isCalibratingMode = false;
        let isVideoReady = false;
        let draggedCorner = null;

        let tableCorners = [
            { x: window.innerWidth * 0.15, y: window.innerHeight * 0.25 },
            { x: window.innerWidth * 0.85, y: window.innerHeight * 0.25 },
            { x: window.innerWidth * 0.85, y: window.innerHeight * 0.75 },
            { x: window.innerWidth * 0.15, y: window.innerHeight * 0.75 }
        ];
        let targetCorners = JSON.parse(JSON.stringify(tableCorners));
        const SMOOTHING_FACTOR = 0.15;

        let ballX = window.innerWidth / 2, ballY = window.innerHeight / 2;
        let aimX = ballX, aimY = ballY - 100, isTouching = false;

        video.addEventListener('loadedmetadata', () => { isVideoReady = true; });

        // Инициализация камеры
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
                video.srcObject = stream;
            } catch (err) {
                console.log("Камера недоступна (возможно ПК без вебки). Работаем в режиме симулятора.");
            }
        }

        // Кнопки HUD
        document.getElementById('btn-settings').addEventListener('click', () => {
            const panel = document.getElementById('settings-panel');
            panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
        });

        const btnCalibrate = document.getElementById('btn-calibrate');
        btnCalibrate.addEventListener('click', () => {
            isCalibratingMode = !isCalibratingMode;
            if (isCalibratingMode) {
                btnCalibrate.classList.add('active-mode');
                document.getElementById('txt-calib').innerText = "Сохранить форму";
                document.getElementById('txt-hint').innerText = "Перетащите 4 точки на углы. Сверху работает лупа!";
            } else {
                btnCalibrate.classList.remove('active-mode');
                document.getElementById('txt-calib').innerText = "Разметка стола";
                document.getElementById('txt-hint').innerText = "Тапните на биток и тяните в сторону для прицеливания";
            }
        });

        document.getElementById('slider-thickness').addEventListener('input', (e) => { laserThickness = parseInt(e.target.value); });
        document.getElementById('slider-length').addEventListener('input', (e) => { maxLaserLength = parseInt(e.target.value); });
        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', (e) => {
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                e.target.classList.add('active');
                laserColor = e.target.getAttribute('data-color');
            });
        });

        // Тач события
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            if (isCalibratingMode) {
                draggedCorner = null;
                for (let i = 0; i < tableCorners.length; i++) {
                    if (Math.hypot(tableCorners[i].x - touch.clientX, tableCorners[i].y - touch.clientY) < 45) {
                        draggedCorner = i; targetCorners[i].x = touch.clientX; targetCorners[i].y = touch.clientY;
                        break;
                    }
                }
            } else {
                ballX = touch.clientX; ballY = touch.clientY; aimX = touch.clientX; aimY = touch.clientY; isTouching = true;
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            if (isCalibratingMode && draggedCorner !== null) {
                targetCorners[draggedCorner].x = touch.clientX; targetCorners[draggedCorner].y = touch.clientY;
            } else if (isTouching) {
                aimX = touch.clientX; aimY = touch.clientY;
            }
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', () => { isTouching = false; draggedCorner = null; });

        // Рендер-цикл
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (isCalibratingMode) {
                for (let i = 0; i < tableCorners.length; i++) {
                    tableCorners[i].x += (targetCorners[i].x - tableCorners[i].x) * SMOOTHING_FACTOR;
                    tableCorners[i].y += (targetCorners[i].y - tableCorners[i].y) * SMOOTHING_FACTOR;
                }
            }

            // Сетка стола
            ctx.beginPath();
            tableCorners.forEach((c, i) => i === 0 ? ctx.moveTo(c.x, c.y) : ctx.lineTo(c.x, c.y));
            ctx.closePath();
            ctx.strokeStyle = isCalibratingMode ? '#00ff66' : 'rgba(255,255,255,0.15)';
            ctx.lineWidth = isCalibratingMode ? 3 : 1;
            ctx.stroke();

            if (isCalibratingMode) {
                tableCorners.forEach((c, i) => {
                    ctx.beginPath(); ctx.arc(c.x, c.y, 14, 0, Math.PI*2);
                    ctx.fillStyle = i === draggedCorner ? '#fff' : 'rgba(0,255,102,0.8)';
                    ctx.fill(); ctx.stroke();
                });

                // Лупа
                if (draggedCorner !== null && isVideoReady) {
                    try {
                        const active = tableCorners[draggedCorner];
                        const size = 120, mX = canvas.width / 2 - size / 2, mY = 90, z = 3;
                        ctx.save();
                        ctx.beginPath(); ctx.arc(mX + size/2, mY + size/2, size/2, 0, Math.PI*2); ctx.clip();
                        ctx.drawImage(video, Math.max(0, active.x - (size/(2*z))), Math.max(0, active.y - (size/(2*z))), size/z, size/z, mX, mY, size, size);
                        ctx.restore();
                        ctx.beginPath(); ctx.arc(mX + size/2, mY + size/2, size/2, 0, Math.PI*2); ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
                    } catch(e){}
                }
            } else {
                // Лазер
                let angle = Math.atan2(aimY - ballY, aimX - ballX);
                ctx.save(); ctx.translate(ballX, ballY); ctx.rotate(angle);
                ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill();
                ctx.beginPath(); ctx.moveTo(16, 0); ctx.lineTo(maxLaserLength, 0);
                ctx.strokeStyle = laserColor; ctx.lineWidth = laserThickness; ctx.stroke();
                ctx.restore();
            }

            requestAnimationFrame(draw);
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();
        initCamera();
        draw();
    </script>
</body>
</html>
