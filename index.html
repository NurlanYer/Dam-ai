<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dam-ai — AR Billiards Prototype</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Контейнер для камеры */
        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Слой для отрисовки лазера (интерактивный только в игре) */
        #canvas-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none; /* По умолчанию выключен, включим в игре */
        }

        /* Интерфейс (всегда поверх всего) */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none; /* Пропускает клики сквозь пустые зоны */
        }

        /* Интерактивные элементы интерфейса должны принимать клики */
        .interactive {
            pointer-events: auto;
        }

        /* Стили Стартового Меню */
        #start-menu {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: opacity 0.5s ease;
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logo span {
            color: #00ff66;
        }

        .tagline {
            color: #aaa;
            font-size: 1rem;
            margin-bottom: 40px;
        }

        .menu-btn {
            background: #00ff66;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 102, 0.4);
            transition: transform 0.2s, background-color 0.2s;
            margin-bottom: 20px;
        }

        .menu-btn:active {
            transform: scale(0.95);
            background: #00cc52;
        }

        /* Переключатель языков */
        .lang-selector {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 15px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .lang-btn.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: #fff;
            font-weight: bold;
        }

        /* Экран игры (HUD) */
        #game-hud {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }
