<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dam-ai — AR Billiards Prototype</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Контейнер для камеры */
        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Слой для отрисовки лазера */
        #canvas-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none; /* Выключен в меню */
        }

        /* Интерфейс поверх всего */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .interactive {
            pointer-events: auto;
        }

        /* Стили Стартового Меню */
        #start-menu {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logo span {
            color: #00ff66;
        }

        .tagline {
            color: #aaa;
            font-size: 1rem;
            margin-bottom: 40px;
        }

        .menu-btn {
            background: #00ff66;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 102, 0.4);
            transition: transform 0.2s;
            margin-bottom: 20px;
        }

        .menu-btn:active {
            transform: scale(0.95);
        }

        /* Переключатель языков */
        .lang-selector {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 15px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .lang-btn.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: #fff;
            font-weight: bold;
        }

        /* Экран игры (HUD) */
        #game-hud {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .hud-header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .status-badge {
            background: rgba(0, 255, 102, 0.2);
            color: #00ff66;
            border: 1px solid #00ff66;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .aim-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            text-align: center;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas-layer"></canvas>

    <div class="ui-layer">
        <div id="start-menu" class="interactive">
            <h1 class="logo">Dam-<span>ai</span></h1>
            <p class="tagline" id="txt-tagline">AR Помощник для бильярда</p>
            <button class="menu-btn" id="btn-start">Запустить камеру</button>
            
            <div class="lang-selector">
                <button class="lang-btn active" id="lang-ru">РУС</button>
                <button class="lang-btn" id="lang-en">ENG</button>
            </div>
        </div>

        <div id="game-hud">
            <div class="hud-header">
                <button class="back-btn interactive" id="btn-back">← Меню</button>
                <div class="status-badge" id="txt-status">AR Активно</div>
            </div>
            <div class="aim-hint" id="txt-hint">Удерживайте и ведите пальцем для наведения лазера</div>
        </div>
    </div>

    <script>
        const languages = {
            ru: {
                tagline: "AR Помощник для бильярда",
                start: "Запустить камеру",
                status: "AR Активно",
                hint: "Удерживайте и ведите пальцем для наведения лазера"
            },
            en: {
                tagline: "AR Billiards Assistant",
                start: "Launch Camera",
                status: "AR Active",
                hint: "Hold and drag your finger to aim the laser"
            }
        };

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas-layer');
        const ctx = canvas.getContext('2d');
        
        const startMenu = document.getElementById('start-menu');
        const gameHud = document.getElementById('game-hud');
        
        const btnStart = document.getElementById('btn-start');
        const btnBack = document.getElementById('btn-back');
        const langRu = document.getElementById('lang-ru');
        const langEn = document.getElementById('lang-en');

        let isAiming = false;
        let touchX = 0;
        let touchY = 0;
        let laserAngle = 0;

        function setLanguage(lang) {
            document.getElementById('txt-tagline').innerText = languages[lang].tagline;
            btnStart.innerText = languages[lang].start;
            document.getElementById('txt-status').innerText = languages[lang].status;
            document.getElementById('txt-hint').innerText = languages[lang].hint;

            if(lang === 'ru') {
                langRu.classList.add('active');
                langEn.classList.remove('active');
            } else {
                langEn.classList.add('active');
                langRu.classList.remove('active');
            }
        }

        langRu.addEventListener('click', () => setLanguage('ru'));
        langEn.addEventListener('click', () => setLanguage('en'));

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Камера недоступна:", err);
            }
        }

        btnStart.addEventListener('click', () => {
            initCamera();
            startMenu.style.display = 'none';
            gameHud.style.display = 'block';
            canvas.style.pointerEvents = 'auto';
            isAiming = true;
            touchX = canvas.width / 2;
            touchY = canvas.height / 2;
        });

        btnBack.addEventListener('click', () => {
            startMenu.style.display = 'flex';
            gameHud.style.display = 'none';
            canvas.style.pointerEvents = 'none';
            isAiming = false;
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            if(!isAiming) return;
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            if(!isAiming) return;
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
            e.preventDefault();
        }, { passive: false });

        function drawLaser() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (isAiming) {
                laserAngle += 0.015;
                ctx.save();
                ctx.translate(touchX, touchY);
                ctx.rotate(laserAngle);

                ctx.beginPath();
                ctx.arc(0, 0, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#00ff66';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ff66';
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(-2000, 0);
                ctx.lineTo(2000, 0);
                ctx.strokeStyle = 'rgba(0, 255, 102, 0.8)';
                ctx.lineWidth = 3;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00ff66';
                ctx.stroke();

                ctx.restore();
            }
            requestAnimationFrame(drawLaser);
        }
        drawLaser();
    </script>
</body>
</html>
