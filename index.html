<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dam-ai — AR Multi-Game Platform</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvas-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .interactive {
            pointer-events: auto;
        }

        /* Главное Меню */
        #start-menu {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 12, 0.88);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 20px;
            overflow-y: auto;
        }

        .header-block {
            text-align: center;
            margin-top: 10px;
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .logo span {
            color: #00ff66;
            text-shadow: 0 0 20px rgba(0, 255, 102, 0.6);
        }

        .tagline {
            color: #888;
            font-size: 0.85rem;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-content {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin: 20px 0;
        }

        .category-section h2 {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 10px;
            padding-left: 5px;
            border-left: 3px solid #00ff66;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .games-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .game-card.available {
            border-color: rgba(0, 255, 102, 0.3);
        }

        .game-card.available:active {
            transform: scale(0.98);
            background: rgba(0, 255, 102, 0.08);
            border-color: #00ff66;
        }

        .game-card.locked {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .game-info h3 {
            color: #fff;
            font-size: 1.05rem;
            margin-bottom: 3px;
        }

        .game-info p {
            color: #aaa;
            font-size: 0.8rem;
        }

        .game-icon {
            font-size: 1.4rem;
        }

        .footer-block {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .lang-dropdown-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.06);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lang-select {
            background: transparent;
            color: #fff;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        .lang-select option {
            background: #111;
            color: #fff;
        }

        /* Игровой HUD */
        #game-hud {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .hud-header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn, .settings-btn {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .settings-btn {
            font-size: 1.2rem;
            padding: 6px 14px;
        }

        .status-badge {
            background: rgba(0, 255, 102, 0.2);
            color: #00ff66;
            border: 1px solid #00ff66;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .aim-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            text-align: center;
            white-space: nowrap;
        }

        /* Всплывающая Панель Настроек внутри AR-мода */
        #ar-settings-panel {
            display: none;
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 360px;
            background: rgba(15, 20, 18, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            flex-direction: column;
            gap: 15px;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setting-item label {
            color: #aaa;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .color-options {
            display: flex;
            gap: 12px;
        }

        .color-dot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }

        .color-dot.active {
            border-color: #fff;
            transform: scale(1.1);
        }

        .thickness-slider {
            width: 100%;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        .thickness-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00ff66;
            cursor: pointer;
        }

        .length-slider {
            width: 100%;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        .length-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas-layer"></canvas>

    <div class="ui-layer">
        
        <div id="start-menu" class="interactive">
            <div class="header-block">
                <h1 class="logo">Dam-<span>ai</span></h1>
                <p class="tagline" id="txt-tagline">Платформа дополненной реальности</p>
            </div>

            <div class="menu-content" id="menu-games-content"></div>
            
            <div class="footer-block">
                <div class="lang-dropdown-container">
                    <span>🌐</span>
                    <select class="lang-select" id="lang-updater">
                        <option value="ru">Русский (RU)</option>
                        <option value="en">English (EN)</option>
                        <option value="es">Español (ES)</option>
                        <option value="zh">中文 (ZH)</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="game-hud">
            <div class="hud-header">
                <button class="back-btn interactive" id="btn-back">← Меню</button>
                <div class="status-badge" id="txt-status">AR Активно</div>
                <button class="settings-btn interactive" id="btn-toggle-settings">⚙️</button>
            </div>

            <div id="ar-settings-panel" class="interactive">
                <div class="setting-item">
                    <label id="lbl-color">Цвет лазера</label>
                    <div class="color-options">
                        <div class="color-dot active" style="background: #00ff66;" data-color="#00ff66"></div>
                        <div class="color-dot" style="background: #ff3333;" data-color="#ff3333"></div>
                        <div class="color-dot" style="background: #3388ff;" data-color="#3388ff"></div>
                    </div>
                </div>
                <div class="setting-item">
                    <label id="lbl-thickness">Толщина луча</label>
                    <input type="range" min="1" max="10" value="3" class="thickness-slider" id="slider-thickness">
                </div>
                <div class="setting-item">
                    <label id="lbl-length">Длина луча (Ограничение)</label>
                    <input type="range" min="100" max="1500" value="600" class="length-slider" id="slider-length">
                </div>
            </div>

            <div class="aim-hint" id="txt-hint">Загрузка модуля игры...</div>
        </div>

    </div>

    <script>
        // ==========================================
        // 1. БАЗА ДАННЫХ ЛОКАЛИЗАЦИИ
        // ==========================================
        const localization = {
            ru: {
                tagline: "Платформа дополненной реальности",
                status: "AR Активно",
                cat_billiards: "Бильярдная группа",
                cat_board: "Настольные игры",
                cat_cards: "Карточные игры",
                hint_billiards: "Тапните на биток и тяните в сторону для прицеливания",
                lbl_color: "Цвет лазера",
                lbl_thickness: "Толщина луча",
                lbl_length: "Длина луча (Прицел)"
            },
            en: {
                tagline: "Augmented Reality Platform",
                status: "AR Active",
                cat_billiards: "Billiards Group",
                cat_board: "Board Games",
                cat_cards: "Card Games",
                hint_billiards: "Tap on the cue ball and drag to aim",
                lbl_color: "Laser Color",
                lbl_thickness: "Beam Thickness",
                lbl_length: "Laser Length"
            },
            es: {
                tagline: "Plataforma de Realidad Aumentada",
                status: "AR Activo",
                cat_billiards: "Grupo de Billar",
                cat_board: "Juegos de Mesa",
                cat_cards: "Juegos de Cartas",
                hint_billiards: "Toca la bola blanca y arrastra para apuntar",
                lbl_color: "Color del Láser",
                lbl_thickness: "Grosor del rayo",
                lbl_length: "Longitud del láser"
            },
            zh: {
                tagline: "增强现实游戏平台",
                status: "AR 已 激活",
                cat_billiards: "台球系列",
                cat_board: "棋类游戏",
                cat_cards: "棋牌纸牌",
                hint_billiards: "点击母球并拖动手指进行瞄准",
                lbl_color: "激光颜色",
                lbl_thickness: "光束粗细",
                lbl_length: "激光长度"
            }
        };

        const gameTitles = {
            ru: {
                billiards_free: { title: "Свободная тренировка", desc: "Умный лазерный прицел" },
                billiards_carom: { title: "Карамболь (Тройка)", desc: "Траектории от трех бортов" },
                chess: { title: "Шахматы AR", desc: "Анализ доски и лучшие ходы" },
                checkers: { title: "Шашки", desc: "Подсчет комбинаций" },
                poker: { title: "Покер / Техас", desc: "Калькулятор шансов на победу" }
            },
            en: {
                billiards_free: { title: "Free Training", desc: "Smart laser aiming assist" },
                billiards_carom: { title: "Carom (3-Cushion)", desc: "3-cushion bounce trajectories" },
                chess: { title: "Chess AR", desc: "Board analysis & best moves" },
                checkers: { title: "Checkers", desc: "Combination analyzer" },
                poker: { title: "Poker / Holdem", desc: "Win probability calculator" }
            }
        };

        const gameStructure = [
            { categoryKey: "cat_billiards", games: [{ id: "billiards_free", icon: "🎯", available: true }, { id: "billiards_carom", icon: "🔒", available: false }] },
            { categoryKey: "cat_board", games: [{ id: "chess", icon: "🔒", available: false }, { id: "checkers", icon: "🔒", available: false }] },
            { categoryKey: "cat_cards", games: [{ id: "poker", icon: "🔒", available: false }] }
        ];

        let currentLang = 'ru';
        let currentActiveGame = null;

        const menuContainer = document.getElementById('menu-games-content');
        const langUpdater = document.getElementById('lang-updater');
        const startMenu = document.getElementById('start-menu');
        const gameHud = document.getElementById('game-hud');
        const btnBack = document.getElementById('btn-back');
        const canvas = document.getElementById('canvas-layer');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('webcam');

        // Настройки AR лазера
        let laserColor = "#00ff66";
        let laserThickness = 3;
        let maxLaserLength = 600;

        const btnToggleSettings = document.getElementById('btn-toggle-settings');
        const arSettingsPanel = document.getElementById('ar-settings-panel');
        const sliderThickness = document.getElementById('slider-thickness');
        const sliderLength = document.getElementById('slider-length');

        function renderMenu() {
            menuContainer.innerHTML = '';
            gameStructure.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'category-section';
                const catTitle = document.createElement('h2');
                catTitle.innerText = localization[currentLang][cat.categoryKey] || cat.categoryKey;
                section.appendChild(catTitle);
                
                const list = document.createElement('div');
                list.className = 'games-list';
                
                cat.games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = `game-card ${game.available ? 'available' : 'locked'} interactive`;
                    const textData = (gameTitles[currentLang] && gameTitles[currentLang][game.id]) ? gameTitles[currentLang][game.id] : {title: game.id, desc: ""};
                    card.innerHTML = `
                        <div class="game-info">
                            <h3>${textData.title}</h3>
                            <p>${textData.desc}</p>
                        </div>
                        <div class="game-icon">${game.icon}</div>
                    `;
                    if(game.available) {
                        card.addEventListener('click', () => launchGameModule(game.id));
                    }
                    list.appendChild(card);
                });
                section.appendChild(list);
                menuContainer.appendChild(section);
            });
            document.getElementById('txt-tagline').innerText = localization[currentLang].tagline;
            document.getElementById('lbl-color').innerText = localization[currentLang].lbl_color;
            document.getElementById('lbl-thickness').innerText = localization[currentLang].lbl_thickness;
            document.getElementById('lbl-length').innerText = localization[currentLang].lbl_length;
        }

        langUpdater.addEventListener('change', (e) => {
            currentLang = e.target.value;
            renderMenu();
        });

        // Открытие/закрытие панели настроек по кнопке ⚙️
        btnToggleSettings.addEventListener('click', () => {
            if (arSettingsPanel.style.display === 'flex') {
                arSettingsPanel.style.display = 'none';
            } else {
                arSettingsPanel.style.display = 'flex';
            }
        });

        // Обработка изменения параметров лазера
        sliderThickness.addEventListener('input', (e) => { laserThickness = parseInt(e.target.value); });
        sliderLength.addEventListener('input', (e) => { maxLaserLength = parseInt(e.target.value); });
        
        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', (e) => {
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                e.target.classList.add('active');
                laserColor = e.target.getAttribute('data-color');
            });
        });

        function launchGameModule(gameId) {
            currentActiveGame = gameId;
            initCamera();
            startMenu.style.display = 'none';
            gameHud.style.display = 'block';
            document.getElementById('txt-status').innerText = localization[currentLang].status;
            
            if (gameId === 'billiards_free') {
                document.getElementById('txt-hint').innerText = localization[currentLang].hint_billiards;
                canvas.style.pointerEvents = 'auto';
                initBilliardsFreeLogic();
            }
        }

        function closeActiveModule() {
            isBilliardsAiming = false;
            currentActiveGame = null;
            startMenu.style.display = 'flex';
            gameHud.style.display = 'none';
            arSettingsPanel.style.display = 'none';
            canvas.style.pointerEvents = 'none';
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        }

        btnBack.addEventListener('click', closeActiveModule);

        // ==========================================
        // 4. КОД ДЛЯ МОДУЛЯ: "СВОБОДНАЯ ТРЕНИРОВКА"
        // ==========================================
        let isBilliardsAiming = false;
        let ballX = 0, ballY = 0;
        let aimX = 0, aimY = 0;
        let isTouching = false; 

        function initBilliardsFreeLogic() {
            isBilliardsAiming = true;
            ballX = canvas.width / 2;
            ballY = canvas.height / 2;
            aimX = ballX;
            aimY = ballY - 100;
            isTouching = false;
        }

        canvas.addEventListener('touchstart', (e) => {
            if(!isBilliardsAiming) return;
            // Проверяем, чтобы тап не был по панели настроек
            if (arSettingsPanel.style.display === 'flex' && e.touches[0].clientY > arSettingsPanel.offsetTop) return;
            
            const touch = e.touches[0];
            ballX = touch.clientX;
            ballY = touch.clientY;
            aimX = touch.clientX;
            aimY = touch.clientY;
            isTouching = true;
        });

        canvas.addEventListener('touchmove', (e) => {
            if(!isBilliardsAiming || !isTouching) return;
            const touch = e.touches[0];
            aimX = touch.clientX;
            aimY = touch.clientY;
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', () => { isTouching = false; });

        function globalRenderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (currentActiveGame === 'billiards_free' && isBilliardsAiming) {
                let angle = Math.atan2(aimY - ballY, aimX - ballX);

                ctx.save();
                ctx.translate(ballX, ballY);
                ctx.rotate(angle);

                // 1. Отрисовка битка (белый шар)
                ctx.beginPath();
                ctx.arc(0, 0, 16, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ffffff';
                ctx.fill();

                // Внутреннее стильное кольцо под выбранный цвет
                ctx.beginPath();
                ctx.arc(0, 0, 8, 0, Math.PI * 2);
                ctx.strokeStyle = laserColor;
                ctx.lineWidth = 2;
                ctx.stroke();

                // 2. Отрисовка ограниченной линии лазерного прицела
                ctx.beginPath();
                ctx.moveTo(16, 0); 
                ctx.lineTo(maxLaserLength, 0); // Ограничиваем длину динамическим ползунком
                ctx.strokeStyle = isTouching ? laserColor : hexToRgbA(laserColor, 0.4);
                ctx.lineWidth = laserThickness; 
                ctx.shadowBlur = isTouching ? 15 : 5;
                ctx.shadowColor = laserColor;
                ctx.stroke();

                // 3. Отрисовка перекрестия на конце лазера (Точка контакта)
                ctx.save();
                ctx.translate(maxLaserLength, 0);
                ctx.rotate(-angle); // Перекрестие стоит прямо относительно экрана
                
                ctx.beginPath();
                // Горизонтальная линия перекрестия
                ctx.moveTo(-10, 0); ctx.lineTo(10, 0);
                // Вертикальная линия перекрестия
                ctx.moveTo(0, -10); ctx.lineTo(0, 10);
                ctx.strokeStyle = laserColor;
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Маленькая центральная точка на перекрестии
                ctx.beginPath();
                ctx.arc(0, 0, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.restore();

                // 4. Отрисовка линии кия назад
                ctx.beginPath();
                ctx.moveTo(-16, 0);
                ctx.lineTo(-120, 0);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.setLineDash([4, 4]);
                ctx.stroke();

                ctx.restore();
            }

            requestAnimationFrame(globalRenderLoop);
        }

        // Вспомогательная функция для прозрачности цвета лазера в покое
        function hexToRgbA(hex, alpha){
            let c;
            if(/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)){
                c= hex.substring(1).split('');
                if(c.length== 3){ c= [c[0], c[0], c[1], c[1], c[2], c[2]]; }
                c= '0x'+c.join('');
                return 'rgba('+[(c>>16)&255, (c>>8)&255, c&255].join(',')+','+alpha+')';
            }
            return hex;
        }

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
                video.srcObject = stream;
            } catch (err) { console.error("Камера недоступна:", err); }
        }

        resizeCanvas();
        renderMenu();
        globalRenderLoop();
    </script>
</body>
</html>
