<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dam-ai — AR Multi-Game Platform</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvas-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .interactive {
            pointer-events: auto;
        }

        /* Главное Меню */
        #start-menu {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 12, 0.88);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 20px;
            overflow-y: auto;
        }

        .header-block {
            text-align: center;
            margin-top: 10px;
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .logo span {
            color: #00ff66;
            text-shadow: 0 0 20px rgba(0, 255, 102, 0.6);
        }

        .tagline {
            color: #888;
            font-size: 0.85rem;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Скролл-контейнер для категорий и игр */
        .menu-content {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin: 20px 0;
        }

        .category-section h2 {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 10px;
            padding-left: 5px;
            border-left: 3px solid #00ff66;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .games-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .game-card.available {
            border-color: rgba(0, 255, 102, 0.3);
        }

        .game-card.available:active {
            transform: scale(0.98);
            background: rgba(0, 255, 102, 0.08);
            border-color: #00ff66;
        }

        .game-card.locked {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .game-info h3 {
            color: #fff;
            font-size: 1.05rem;
            margin-bottom: 3px;
        }

        .game-info p {
            color: #aaa;
            font-size: 0.8rem;
        }

        .game-icon {
            font-size: 1.4rem;
        }

        /* Селектор языков */
        .footer-block {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .lang-dropdown-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.06);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lang-select {
            background: transparent;
            color: #fff;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        .lang-select option {
            background: #111;
            color: #fff;
        }

        /* Игровой HUD общий */
        #game-hud {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .hud-header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .status-badge {
            background: rgba(0, 255, 102, 0.2);
            color: #00ff66;
            border: 1px solid #00ff66;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .aim-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            text-align: center;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas-layer"></canvas>

    <div class="ui-layer">
        
        <div id="start-menu" class="interactive">
            
            <div class="header-block">
                <h1 class="logo">Dam-<span>ai</span></h1>
                <p class="tagline" id="txt-tagline">Платформа дополненной реальности</p>
            </div>

            <div class="menu-content" id="menu-games-content"></div>
            
            <div class="footer-block">
                <div class="lang-dropdown-container">
                    <span>🌐</span>
                    <select class="lang-select" id="lang-updater">
                        <option value="ru">Русский (RU)</option>
                        <option value="en">English (EN)</option>
                        <option value="es">Español (ES)</option>
                        <option value="zh">中文 (ZH)</option>
                    </select>
                </div>
            </div>

        </div>

        <div id="game-hud">
            <div class="hud-header">
                <button class="back-btn interactive" id="btn-back">← Меню</button>
                <div class="status-badge" id="txt-status">AR Активно</div>
            </div>
            <div class="aim-hint" id="txt-hint">Загрузка модуля игры...</div>
        </div>

    </div>

    <script>
        // ==========================================
        // 1. БАЗА ДАННЫХ ЛОКАЛИЗАЦИИ
        // ==========================================
        const localization = {
            ru: {
                tagline: "Платформа дополненной реальности",
                status: "AR Активно",
                cat_billiards: "Бильярдная группа",
                cat_board: "Настольные игры",
                cat_cards: "Карточные игры",
                hint_billiards: "Тапните на биток и тяните в сторону для прицеливания",
                hint_locked: "Этот игровой модуль находится в разработке"
            },
            en: {
                tagline: "Augmented Reality Platform",
                status: "AR Active",
                cat_billiards: "Billiards Group",
                cat_board: "Board Games",
                cat_cards: "Card Games",
                hint_billiards: "Tap on the cue ball and drag to aim",
                hint_locked: "This game module is under development"
            },
            es: {
                tagline: "Plataforma de Realidad Aumentada",
                status: "AR Activo",
                cat_billiards: "Grupo de Billar",
                cat_board: "Juegos de Mesa",
                cat_cards: "Juegos de Cartas",
                hint_billiards: "Toca la bola blanca y arrastra para apuntar",
                hint_locked: "Este módulo está en desarrollo"
            },
            zh: {
                tagline: "增强现实游戏平台",
                status: "AR 已 激活",
                cat_billiards: "台球系列",
                cat_board: "棋类游戏",
                cat_cards: "棋牌纸牌",
                hint_billiards: "点击母球并拖动手指进行瞄准",
                hint_locked: "该游戏模块正在开发中"
            }
        };

        const gameTitles = {
            ru: {
                billiards_free: { title: "Свободная тренировка", desc: "Умный лазерный прицел" },
                billiards_carom: { title: "Карамболь (Тройка)", desc: "Траектории от трех бортов" },
                chess: { title: "Шахматы AR", desc: "Анализ доски и лучшие ходы" },
                checkers: { title: "Шашки", desc: "Подсчет комбинаций" },
                poker: { title: "Покер / Техас", desc: "Калькулятор шансов на победу" }
            },
            en: {
                billiards_free: { title: "Free Training", desc: "Smart laser aiming assist" },
                billiards_carom: { title: "Carom (3-Cushion)", desc: "3-cushion bounce trajectories" },
                chess: { title: "Chess AR", desc: "Board analysis & best moves" },
                checkers: { title: "Checkers", desc: "Combination analyzer" },
                poker: { title: "Poker / Holdem", desc: "Win probability calculator" }
            },
            es: {
                billiards_free: { title: "Entrenamiento Libre", desc: "Asistente de mira láser" },
                billiards_carom: { title: "Carambola (3 Bandas)", desc: "Trayectorias de rebote" },
                chess: { title: "Ajedrez AR", desc: "Análisis de tablero y jugadas" },
                checkers: { title: "Damas", desc: "Analizador de combinaciones" },
                poker: { title: "Póker / Holdem", desc: "Calculadora de probabilidades" }
            },
            zh: {
                billiards_free: { title: "自由训练", desc: "智能激光瞄准辅助" },
                billiards_carom: { title: "三边开伦", desc: "三边弹性轨迹预测" },
                chess: { title: "AR 国际象棋", desc: "棋盘分析与最佳走法提示" },
                checkers: { title: "国际跳棋", desc: "计算吃子组合" },
                poker: { title: "德州扑к", desc: "实时胜率计算器" }
            }
        };

        const gameStructure = [
            {
                categoryKey: "cat_billiards",
                games: [
                    { id: "billiards_free", icon: "🎯", available: true },
                    { id: "billiards_carom", icon: "🔒", available: false }
                ]
            },
            {
                categoryKey: "cat_board",
                games: [
                    { id: "chess", icon: "🔒", available: false },
                    { id: "checkers", icon: "🔒", available: false }
                ]
            },
            {
                categoryKey: "cat_cards",
                games: [
                    { id: "poker", icon: "🔒", available: false }
                ]
            }
        ];

        let currentLang = 'ru';
        let currentActiveGame = null;

        const menuContainer = document.getElementById('menu-games-content');
        const langUpdater = document.getElementById('lang-updater');
        const startMenu = document.getElementById('start-menu');
        const gameHud = document.getElementById('game-hud');
        const btnBack = document.getElementById('btn-back');
        const canvas = document.getElementById('canvas-layer');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('webcam');

        function renderMenu() {
            menuContainer.innerHTML = '';
            gameStructure.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'category-section';
                
                const catTitle = document.createElement('h2');
                catTitle.innerText = localization[currentLang][cat.categoryKey];
                section.appendChild(catTitle);
                
                const list = document.createElement('div');
                list.className = 'games-list';
                
                cat.games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = `game-card ${game.available ? 'available' : 'locked'} interactive`;
                    
                    const textData = gameTitles[currentLang][game.id];
                    card.innerHTML = `
                        <div class="game-info">
                            <h3>${textData.title}</h3>
                            <p>${textData.desc}</p>
                        </div>
                        <div class="game-icon">${game.icon}</div>
                    `;
                    
                    if(game.available) {
                        card.addEventListener('click', () => launchGameModule(game.id));
                    }
                    list.appendChild(card);
                });
                section.appendChild(list);
                menuContainer.appendChild(section);
            });
            document.getElementById('txt-tagline').innerText = localization[currentLang].tagline;
        }

        langUpdater.addEventListener('change', (e) => {
            currentLang = e.target.value;
            renderMenu();
        });

        function launchGameModule(gameId) {
            currentActiveGame = gameId;
            initCamera();
            startMenu.style.display = 'none';
            gameHud.style.display = 'block';
            document.getElementById('txt-status').innerText = localization[currentLang].status;
            
            if (gameId === 'billiards_free') {
                document.getElementById('txt-hint').innerText = localization[currentLang].hint_billiards;
                canvas.style.pointerEvents = 'auto';
                initBilliardsFreeLogic();
            }
        }

        function closeActiveModule() {
            isBilliardsAiming = false;
            currentActiveGame = null;
            startMenu.style.display = 'flex';
            gameHud.style.display = 'none';
            canvas.style.pointerEvents = 'none';
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        }

        btnBack.addEventListener('click', closeActiveModule);

        // ==========================================
        // 4. КОД ДЛЯ КОНКРЕТНОЙ ИГРЫ: "СВОБОДНАЯ ТРЕНИРОВКА" (ИНТЕРАКТИВ)
        // ==========================================
        let isBilliardsAiming = false;
        
        // Координаты центрального шара (битка)
        let ballX = 0;
        let ballY = 0;
        
        // Текущие координаты пальца (куда целимся)
        let aimX = 0;
        let aimY = 0;
        
        // Флаг того, что палец сейчас касается экрана
        let isTouching = false; 

        function initBilliardsFreeLogic() {
            isBilliardsAiming = true;
            // По умолчанию ставим виртуальный биток ровно по центру экрана
            ballX = canvas.width / 2;
            ballY = canvas.height / 2;
            aimX = ballX;
            aimY = ballY - 100; // Направлен изначально вверх
            isTouching = false;
        }

        canvas.addEventListener('touchstart', (e) => {
            if(!isBilliardsAiming) return;
            const touch = e.touches[0];
            
            // Фиксируем биток в точке первого тапа
            ballX = touch.clientX;
            ballY = touch.clientY;
            
            // Точка прицела изначально там же
            aimX = touch.clientX;
            aimY = touch.clientY;
            
            isTouching = true;
        });

        canvas.addEventListener('touchmove', (e) => {
            if(!isBilliardsAiming || !isTouching) return;
            const touch = e.touches[0];
            
            // Обновляем только координату прицеливания при движении пальца
            aimX = touch.clientX;
            aimY = touch.clientY;
            
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            // Когда отпустили палец, лазер застывает в текущем направлении
            isTouching = false;
        });

        // Общий игровой цикл отрисовки
        function globalRenderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (currentActiveGame === 'billiards_free' && isBilliardsAiming) {
                
                // Вычисляем угол между битком (ballX, ballY) и пальцем (aimX, aimY)
                let angle = Math.atan2(aimY - ballY, aimX - ballX);

                ctx.save();
                ctx.translate(ballX, ballY);
                ctx.rotate(angle);

                // 1. Отрисовка виртуального битка (белый шар)
                ctx.beginPath();
                ctx.arc(0, 0, 16, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ffffff';
                ctx.fill();

                // Внутренний зеленый контур для стиля AR
                ctx.beginPath();
                ctx.arc(0, 0, 8, 0, Math.PI * 2);
                ctx.strokeStyle = '#00ff66';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 2. Отрисовка линии лазерного прицела вперед
                ctx.beginPath();
                ctx.moveTo(16, 0); // Начинаем от края шара
                ctx.lineTo(2000, 0); // Уходит вперед за горизонт
                ctx.strokeStyle = isTouching ? 'rgba(0, 255, 102, 0.9)' : 'rgba(0, 255, 102, 0.4)';
                ctx.lineWidth = isTouching ? 4 : 2; // Толще, когда ведем пальцем
                ctx.shadowBlur = isTouching ? 15 : 5;
                ctx.shadowColor = '#00ff66';
                ctx.stroke();

                // 3. Отрисовка линии кия назад (опционально, для наглядности вектора)
                ctx.beginPath();
                ctx.moveTo(-16, 0);
                ctx.lineTo(-120, 0);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.setLineDash([4, 4]); // Пунктирная линия кия
                ctx.stroke();

                ctx.restore();
            }

            requestAnimationFrame(globalRenderLoop);
        }

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
                video.srcObject = stream;
            } catch (err) { console.error("Камера недоступна:", err); }
        }

        resizeCanvas();
        renderMenu();
        globalRenderLoop();
    </script>
</body>
</html>
