<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dam-ai — AR Billiards Prototype</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Контейнер для камеры */
        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Слой для отрисовки лазера */
        #canvas-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Интерфейс поверх всего */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .interactive {
            pointer-events: auto;
        }

        /* Стили Стартового Меню */
        #start-menu {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 12, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 20px;
        }

        .header-block {
            text-align: center;
            margin-top: 20px;
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .logo span {
            color: #00ff66;
            text-shadow: 0 0 20px rgba(0, 255, 102, 0.6);
        }

        .tagline {
            color: #888;
            font-size: 0.95rem;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Сетка выбора режимов (Игры) */
        .modes-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            margin: 30px 0;
        }

        .mode-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        /* Стили для активного режима */
        .mode-card.active-mode {
            border-color: #00ff66;
            background: rgba(0, 255, 102, 0.08);
            box-shadow: 0 4px 20px rgba(0, 255, 102, 0.15);
        }

        .mode-card.active-mode:active {
            transform: scale(0.98);
            background: rgba(0, 255, 102, 0.15);
        }

        /* Стили для заблокированных режимов */
        .mode-card.locked-mode {
            opacity: 0.5;
            cursor: not-allowed;
            background: rgba(0, 0, 0, 0.4);
        }

        .mode-info h3 {
            color: #fff;
            font-size: 1.15rem;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .mode-info p {
            color: #aaa;
            font-size: 0.85rem;
        }

        .mode-icon {
            font-size: 1.5rem;
            color: #00ff66;
        }

        .mode-card.locked-mode .mode-icon {
            color: #666;
        }

        /* Нижний блок: язык */
        .footer-block {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .lang-selector {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lang-btn {
            background: transparent;
            color: #888;
            border: none;
            padding: 8px 20px;
            border-radius: 16px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: #fff;
            color: #000;
        }

        /* Экран игры (HUD) */
        #game-hud {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .hud-header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .status-badge {
            background: rgba(0, 255, 102, 0.2);
            color: #00ff66;
            border: 1px solid #00ff66;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .aim-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            text-align: center;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas-layer"></canvas>

    <div class="ui-layer">
        
        <div id="start-menu" class="interactive">
            
            <div class="header-block">
                <h1 class="logo">Dam-<span>ai</span></h1>
                <p class="tagline" id="txt-tagline">AR Помощник для бильярда</p>
            </div>

            <div class="modes-grid">
                
                <div class="mode-card active-mode" id="btn-start-training">
                    <div class="mode-info">
                        <h3 id="title-m1">Свободная тренировка</h3>
                        <p id="desc-m1">Умный лазерный прицел для любых ударов</p>
                    </div>
                    <div class="mode-icon">🎯</div>
                </div>

                <div class="mode-card locked-mode">
                    <div class="mode-info">
                        <h3 id="title-m2">Игра: Карамболь (Тройка)</h3>
                        <p id="desc-m2">Отрисовка траекторий от трех бортов</p>
                    </div>
                    <div class="mode-icon">🔒</div>
                </div>

                <div class="mode-card locked-mode">
                    <div class="mode-info">
                        <h3 id="title-m3">Упражнения на резку</h3>
                        <p id="desc-m3">Интерактивные подсказки углов прицеливания</p>
                    </div>
                    <div class="mode-icon">🔒</div>
                </div>

            </div>
            
            <div class="footer-block">
                <div class="lang-selector">
                    <button class="lang-btn active" id="lang-ru">РУС</button>
                    <button class="lang-btn" id="lang-en">ENG</button>
                </div>
            </div>

        </div>

        <div id="game-hud">
            <div class="hud-header">
                <button class="back-btn interactive" id="btn-back">← Меню</button>
                <div class="status-badge" id="txt-status">AR Активно</div>
            </div>
            <div class="aim-hint" id="txt-hint">Удерживайте и ведите пальцем для наведения лазера</div>
        </div>

    </div>

    <script>
        // Локализация текстов меню и игр
        const languages = {
            ru: {
                tagline: "AR Помощник для бильярда",
                m1_title: "Свободная тренировка",
                m1_desc: "Умный лазерный прицел для любых ударов",
                m2_title: "Игра: Карамболь (Тройка)",
                m2_desc: "Отрисовка траекторий от трех бортов",
                m3_title: "Упражнения на резку",
                m3_desc: "Интерактивные подсказки углов прицеливания",
                status: "AR Активно",
                hint: "Удерживайте и ведите пальцем для наведения лазера"
            },
            en: {
                tagline: "AR Billiards Assistant",
                m1_title: "Free Training",
                m1_desc: "Smart laser aim for any types of shots",
                m2_title: "Game: Carom (3-Cushion)",
                m2_desc: "Predicting trajectories from three cushions",
                m3_title: "Cut Shot Drills",
                m3_desc: "Interactive aiming angle guides",
                status: "AR Active",
                hint: "Hold and drag your finger to aim the laser"
            }
        };

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas-layer');
        const ctx = canvas.getContext('2d');
        
        const startMenu = document.getElementById('start-menu');
        const gameHud = document.getElementById('game-hud');
        
        const btnStartTraining = document.getElementById('btn-start-training');
        const btnBack = document.getElementById('btn-back');
        const langRu = document.getElementById('lang-ru');
        const langEn = document.getElementById('lang-en');

        let isAiming = false;
        let touchX = 0;
        let touchY = 0;
        let laserAngle = 0;

        // Функция смены языка
        function setLanguage(lang) {
            document.getElementById('txt-tagline').innerText = languages[lang].tagline;
            document.getElementById('title-m1').innerText = languages[lang].m1_title;
            document.getElementById('desc-m1').innerText = languages[lang].m1_desc;
            document.getElementById('title-m2').innerText = languages[lang].m2_title;
            document.getElementById('desc-m2').innerText = languages[lang].m2_desc;
            document.getElementById('title-m3').innerText = languages[lang].m3_title;
            document.getElementById('desc-m3').innerText = languages[lang].m3_desc;
            
            document.getElementById('txt-status').innerText = languages[lang].status;
            document.getElementById('txt-hint').innerText = languages[lang].hint;

            if(lang === 'ru') {
                langRu.classList.add('active');
                langEn.classList.remove('active');
            } else {
                langEn.classList.add('active');
                langRu.classList.remove('active');
            }
        }

        langRu.addEventListener('click', () => setLanguage('ru'));
        langEn.addEventListener('click', () => setLanguage('en'));

        // Подгонка холста
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Камера
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Камера недоступна:", err);
            }
        }

        // Клик по карточке "Свободная тренировка" запускает игру
        btnStartTraining.addEventListener('click', () => {
            initCamera();
            startMenu.style.display = 'none';
            gameHud.style.display = 'block';
            canvas.style.pointerEvents = 'auto';
            isAiming = true;
            touchX = canvas.width / 2;
            touchY = canvas.height / 2;
        });

        // Назад в меню
        btnBack.addEventListener('click', () => {
            startMenu.style.display = 'flex';
            gameHud.style.display = 'none';
            canvas.style.pointerEvents = 'none';
            isAiming = false;
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        });

        // Тач-события
        canvas.addEventListener('touchstart', (e) => {
            if(!isAiming) return;
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            if(!isAiming) return;
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
            e.preventDefault();
        }, { passive: false });

        // Отрисовка
        function drawLaser() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (isAiming) {
                laserAngle += 0.015;
                ctx.save();
                ctx.translate(touchX, touchY);
                ctx.rotate(laserAngle);

                ctx.beginPath();
                ctx.arc(0, 0, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#00ff66';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ff66';
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(-2000, 0);
                ctx.lineTo(2000, 0);
                ctx.strokeStyle = 'rgba(0, 255, 102, 0.8)';
                ctx.lineWidth = 3;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00ff66';
                ctx.stroke();

                ctx.restore();
            }
            requestAnimationFrame(drawLaser);
        }
        drawLaser();
    </script>
</body>
</html>
