<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dam-ai — AR Multi-Game Platform</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d0f12;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvas-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .interactive {
            pointer-events: auto;
        }

      <!-- УДАЛИТЕ ЭТОТ СТАРЫЙ БЛОК: -->
<div class="game-card locked">
    <div class="game-info">
        <h3>Шахматы AR</h3>
        <p>Анализ позиций и подсказки лучших ходов</p>
    </div>
    <div class="game-icon">👑</div>
</div>

        .header-block {
            text-align: center;
            margin-top: 10px;
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .logo span {
            color: #00ff66;
            text-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }

        .tagline {
            color: #888;
            font-size: 0.85rem;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-content {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin: 20px 0;
        }

        .category-section h2 {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 10px;
            padding-left: 5px;
            border-left: 3px solid #00ff66;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .games-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .game-card.available { border-color: rgba(0, 255, 102, 0.3); }

        .game-info h3 { color: #fff; font-size: 1.05rem; margin-bottom: 3px; }
        .game-info p { color: #aaa; font-size: 0.8rem; }
        .game-icon { font-size: 1.4rem; }

        .footer-block { width: 100%; display: flex; justify-content: center; }

        .lang-dropdown-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.08);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .lang-select {
            background: transparent;
            color: #fff;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            outline: none;
        }

        .lang-select option { background: #111; color: #fff; }

        /* Игровой HUD */
        #game-hud {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .hud-header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn, .settings-btn, .calibrate-btn {
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .settings-btn { font-size: 1.2rem; padding: 6px 14px; }
        .calibrate-btn { border-color: rgba(0, 255, 102, 0.4); color: #00ff66; font-weight: 600; }
        .calibrate-btn.active-mode { background: #00ff66; color: #000; border-color: #00ff66; }

        .aim-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            text-align: center;
            white-space: nowrap;
        }

        #ar-settings-panel {
            display: none;
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 360px;
            background: #131714;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            flex-direction: column;
            gap: 15px;
        }

        .setting-item { display: flex; flex-direction: column; gap: 8px; }
        .setting-item label { color: #aaa; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

        .color-options { display: flex; gap: 12px; }
        .color-dot { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-dot.active { border-color: #fff; transform: scale(1.1); }

        .thickness-slider, .length-slider { width: 100%; -webkit-appearance: none; background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; outline: none; }
        .thickness-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #00ff66; }
        .length-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #fff; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas-layer"></canvas>

    <div class="ui-layer">
        
        <!-- Главное Меню -->
        <div id="start-menu" class="interactive">
            <div class="header-block">
                <h1 class="logo">Dam-<span>ai</span></h1>
                <p class="tagline" id="txt-tagline">Платформа дополненной реальности</p>
            </div>

            <div class="menu-content" id="menu-games-content"></div>
            
            <div class="footer-block">
                <div class="lang-dropdown-container">
                    <span>🌐</span>
                    <select class="lang-select" id="lang-updater">
                        <option value="ru">Русский (RU)</option>
                        <option value="en">English (EN)</option>
                        <option value="es">Español (ES)</option>
                        <option value="zh">中文 (ZH)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Игровой HUD -->
        <div id="game-hud">
            <div class="hud-header">
                <button class="back-btn interactive" id="btn-back">← Меню</button>
                <button class="calibrate-btn interactive" id="btn-calibrate">📐 <span id="txt-btn-calib">Разметка стола</span></button>
                <button class="settings-btn interactive" id="btn-toggle-settings">⚙️</button>
            </div>

            <div id="ar-settings-panel" class="interactive">
                <div class="setting-item">
                    <label id="lbl-color">Цвет лазера</label>
                    <div class="color-options">
                        <div class="color-dot active" style="background: #00ff66;" data-color="#00ff66"></div>
                        <div class="color-dot" style="background: #ff3333;" data-color="#ff3333"></div>
                        <div class="color-dot" style="background: #3388ff;" data-color="#3388ff"></div>
                    </div>
                </div>
                <div class="setting-item">
                    <label id="lbl-thickness">Толщина луча</label>
                    <input type="range" min="1" max="10" value="3" class="thickness-slider" id="slider-thickness">
                </div>
                <div class="setting-item">
                    <label id="lbl-length">Длина луча (Ограничение)</label>
                    <input type="range" min="100" max="1500" value="600" class="length-slider" id="slider-length">
                </div>
            </div>

            <div class="aim-hint" id="txt-hint">Загрузка модуля игры...</div>
        </div>

    </div>

    <script>
        // Добавили базовые переводы для предотвращения ошибок считывания
        const localization = {
            ru: {
                tagline: "Платформа дополненной реальности",
                cat_billiards: "Бильярдная группа",
                hint_billiards: "Тапните на биток и тяните в сторону для прицеливания",
                hint_calibrate: "Перетащите 4 точки на углы. Сверху работает лупа-прицел!",
                lbl_color: "Цвет лазера",
                lbl_thickness: "Толщина луча",
                lbl_length: "Длина луча (Прицел)",
                btn_calib_start: "Разметка стола",
                btn_calib_save: "Сохранить форму"
            },
            en: {
                tagline: "Augmented Reality Platform",
                cat_billiards: "Billiards Group",
                hint_billiards: "Tap on the cue ball and drag to aim",
                hint_calibrate: "Drag 4 corners. Use the zoom magnifier at the top!",
                lbl_color: "Laser Color",
                lbl_thickness: "Beam Thickness",
                lbl_length: "Laser Length",
                btn_calib_start: "Table Setup",
                btn_calib_save: "Save Borders"
            },
            es: { tagline: "Plataforma de Realidad Aumentada", cat_billiards: "Billar", hint_billiards: "Toque y arrastre", hint_calibrate: "Ajustar", lbl_color: "Color", lbl_thickness: "Grosor", lbl_length: "Longitud", btn_calib_start: "Calibración", btn_calib_save: "Guardar" },
            zh: { tagline: "增强现实平台", cat_billiards: "台球组", hint_billiards: "拖动瞄准", hint_calibrate: "调整校准", lbl_color: "激光颜色", lbl_thickness: "线条粗细", lbl_length: "激光长度", btn_calib_start: "校准区域", btn_calib_save: "保存区域" }
        };

        const gameTitles = {
            ru: { billiards_free: { title: "Свободная тренировка", desc: "Умный лазерный прицел" } },
            en: { billiards_free: { title: "Free Training", desc: "Smart laser aiming assist" } },
            es: { billiards_free: { title: "Entrenamiento libre", desc: "Guía láser inteligente" } },
            zh: { billiards_free: { title: "自由训练", desc: "智能激光辅助瞄准" } }
        };

        const gameStructure = [
            { categoryKey: "cat_billiards", games: [{ id: "billiards_free", icon: "🎯" }] }
        ];

        let currentLang = 'ru';
        let currentActiveGame = null;

        const menuContainer = document.getElementById('menu-games-content');
        const langUpdater = document.getElementById('lang-updater');
        const startMenu = document.getElementById('start-menu');
        const gameHud = document.getElementById('game-hud');
        const btnBack = document.getElementById('btn-back');
        const canvas = document.getElementById('canvas-layer');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('webcam');

        let laserColor = "#00ff66";
        let laserThickness = 3;
        let maxLaserLength = 600;

        let isCalibratingMode = false;
        let isVideoReady = false; 
        
        let tableCorners = [
            { x: 100, y: 150 },
            { x: 300, y: 150 },
            { x: 300, y: 450 },
            { x: 100, y: 450 }
        ];
        let targetCorners = [];
        let draggedCorner = null;

        const SMOOTHING_FACTOR = 0.15; 

        const btnToggleSettings = document.getElementById('btn-toggle-settings');
        const arSettingsPanel = document.getElementById('ar-settings-panel');
        const sliderThickness = document.getElementById('slider-thickness');
        const sliderLength = document.getElementById('slider-length');
        const btnCalibrate = document.getElementById('btn-calibrate');
        const txtBtnCalib = document.getElementById('txt-btn-calib');

        video.addEventListener('loadedmetadata', () => { isVideoReady = true; });

        function renderMenu() {
            menuContainer.innerHTML = '';
            
            // Защитный фикс: если язык не поддерживается, сбрасываем на английский
            let activeLang = localization[currentLang] ? currentLang : 'en';

            gameStructure.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'category-section';
                const catTitle = document.createElement('h2');
                catTitle.innerText = localization[activeLang][cat.categoryKey] || cat.categoryKey;
                section.appendChild(catTitle);
                
                const list = document.createElement('div');
                list.className = 'games-list';
                
                cat.games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = `game-card available interactive`;
                    
                    // Безопасное чтение перевода игр
                    const textData = (gameTitles[activeLang] && gameTitles[activeLang][game.id]) 
                        ? gameTitles[activeLang][game.id] 
                        : { title: "Free Training", desc: "Smart laser assist" };

                    card.innerHTML = `
                        <div class="game-info">
                            <h3>${textData.title}</h3>
                            <p>${textData.desc}</p>
                        </div>
                        <div class="game-icon">${game.icon}</div>
                    `;
                    card.addEventListener('click', () => launchGameModule(game.id));
                    list.appendChild(card);
                });
                section.appendChild(list);
                menuContainer.appendChild(section);
            });

            document.getElementById('txt-tagline').innerText = localization[activeLang].tagline;
            document.getElementById('lbl-color').innerText = localization[activeLang].lbl_color;
            document.getElementById('lbl-thickness').innerText = localization[activeLang].lbl_thickness;
            document.getElementById('lbl-length').innerText = localization[activeLang].lbl_length;
            updateCalibrateButtonText();
        }

        function updateCalibrateButtonText() {
            let activeLang = localization[currentLang] ? currentLang : 'en';
            txtBtnCalib.innerText = isCalibratingMode ? localization[activeLang].btn_calib_save : localization[activeLang].btn_calib_start;
        }

        langUpdater.addEventListener('change', (e) => { currentLang = e.target.value; renderMenu(); });
        btnToggleSettings.addEventListener('click', () => { arSettingsPanel.style.display = arSettingsPanel.style.display === 'flex' ? 'none' : 'flex'; });

        btnCalibrate.addEventListener('click', () => {
            let activeLang = localization[currentLang] ? currentLang : 'en';
            isCalibratingMode = !isCalibratingMode;
            if (isCalibratingMode) {
                btnCalibrate.classList.add('active-mode');
                document.getElementById('txt-hint').innerText = localization[activeLang].hint_calibrate;
                arSettingsPanel.style.display = 'none';
            } else {
                btnCalibrate.classList.remove('active-mode');
                document.getElementById('txt-hint').innerText = localization[activeLang].hint_billiards;
            }
            updateCalibrateButtonText();
        });

        sliderThickness.addEventListener('input', (e) => { laserThickness = parseInt(e.target.value); });
        sliderLength.addEventListener('input', (e) => { maxLaserLength = parseInt(e.target.value); });
        
        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', (e) => {
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                e.target.classList.add('active');
                laserColor = e.target.getAttribute('data-color');
            });
        });

        function launchGameModule(gameId) {
            let activeLang = localization[currentLang] ? currentLang : 'en';
            currentActiveGame = gameId;
            initCamera();
            startMenu.style.display = 'none';
            gameHud.style.display = 'block';
            
            const initBox = [
                { x: window.innerWidth * 0.15, y: window.innerHeight * 0.25 },
                { x: window.innerWidth * 0.85, y: window.innerHeight * 0.25 },
                { x: window.innerWidth * 0.85, y: window.innerHeight * 0.75 },
                { x: window.innerWidth * 0.15, y: window.innerHeight * 0.75 }
            ];
            tableCorners = JSON.parse(JSON.stringify(initBox));
            targetCorners = JSON.parse(JSON.stringify(initBox));

            if (gameId === 'billiards_free') {
                document.getElementById('txt-hint').innerText = localization[activeLang].hint_billiards;
                canvas.style.pointerEvents = 'auto';
                initBilliardsFreeLogic();
            }
        }

        function closeActiveModule() {
            isBilliardsAiming = false; isCalibratingMode = false;
            btnCalibrate.classList.remove('active-mode'); currentActiveGame = null;
            startMenu.style.display = 'flex'; gameHud.style.display = 'none'; arSettingsPanel.style.display = 'none';
            canvas.style.pointerEvents = 'none'; isVideoReady = false;
            if (video.srcObject) { video.srcObject.getTracks().forEach(track => track.stop()); }
        }

        btnBack.addEventListener('click', closeActiveModule);

        let isBilliardsAiming = false;
        let ballX = 0, ballY = 0;
        let aimX = 0, aimY = 0;
        let isTouching = false; 

        function initBilliardsFreeLogic() {
            isBilliardsAiming = true; ballX = canvas.width / 2; ballY = canvas.height / 2;
            aimX = ballX; aimY = ballY - 100; isTouching = false;
        }

        canvas.addEventListener('touchstart', (e) => {
            if(!isBilliardsAiming) return;
            const touch = e.touches[0];
            const tX = touch.clientX;
            const tY = touch.clientY;

            if (isCalibratingMode) {
                draggedCorner = null;
                for (let i = 0; i < tableCorners.length; i++) {
                    let dist = Math.hypot(tableCorners[i].x - tX, tableCorners[i].y - tY);
                    if (dist < 45) {
                        draggedCorner = i;
                        targetCorners[i].x = tX;
                        targetCorners[i].y = tY;
                        break;
                    }
                }
                return;
            }

            if (arSettingsPanel.style.display === 'flex' && tY > arSettingsPanel.offsetTop) return;
            ballX = tX; ballY = tY; aimX = tX; aimY = tY; isTouching = true;
        });

        canvas.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const tX = touch.clientX;
            const tY = touch.clientY;

            if (isCalibratingMode) {
                if (draggedCorner !== null) {
                    targetCorners[draggedCorner].x = tX;
                    targetCorners[draggedCorner].y = tY;
                }
                e.preventDefault();
                return;
            }

            if(!isBilliardsAiming || !isTouching) return;
            aimX = tX; aimY = tY;
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', () => { isTouching = false; draggedCorner = null; });

        function globalRenderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (currentActiveGame === 'billiards_free' && isBilliardsAiming) {
                
                if (isCalibratingMode && targetCorners.length === tableCorners.length) {
                    for (let i = 0; i < tableCorners.length; i++) {
                        tableCorners[i].x += (targetCorners[i].x - tableCorners[i].x) * SMOOTHING_FACTOR;
                        tableCorners[i].y += (targetCorners[i].y - tableCorners[i].y) * SMOOTHING_FACTOR;
                    }
                }

                ctx.beginPath();
                ctx.moveTo(tableCorners[0].x, tableCorners[0].y);
                ctx.lineTo(tableCorners[1].x, tableCorners[1].y);
                ctx.lineTo(tableCorners[2].x, tableCorners[2].y);
                ctx.lineTo(tableCorners[3].x, tableCorners[3].y);
                ctx.closePath();
                
                ctx.strokeStyle = isCalibratingMode ? '#00ff66' : 'rgba(255, 255, 255, 0.15)';
                ctx.lineWidth = isCalibratingMode ? 3 : 1;
                ctx.stroke();

                if (isCalibratingMode) {
                    tableCorners.forEach((corner, i) => {
                        ctx.beginPath();
                        ctx.arc(corner.x, corner.y, 14, 0, Math.PI * 2);
                        ctx.fillStyle = i === draggedCorner ? '#ffffff' : 'rgba(0, 255, 102, 0.8)';
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = 2;
                        ctx.fill();
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.moveTo(corner.x - 6, corner.y); ctx.lineTo(corner.x + 6, corner.y);
                        ctx.moveTo(corner.x, corner.y - 6); ctx.lineTo(corner.x, corner.y + 6);
                        ctx.strokeStyle = '#000000'; ctx.lineWidth = 1.5;
                        ctx.stroke();
                    });

                    if (draggedCorner !== null && isVideoReady) {
                        try {
                            const activeCorner = tableCorners[draggedCorner];
                            const magnifyingSize = 120; 
                            const magX = canvas.width / 2 - magnifyingSize / 2; 
                            const magY = 90; 
                            const zoom = 3;  

                            ctx.save();
                            
                            ctx.beginPath();
                            ctx.arc(magX + magnifyingSize/2, magY + magnifyingSize/2, magnifyingSize/2, 0, Math.PI * 2);
                            ctx.clip();

                            ctx.drawImage(
                                video, 
                                Math.max(0, activeCorner.x - (magnifyingSize / (2 * zoom))), 
                                Math.max(0, activeCorner.y - (magnifyingSize / (2 * zoom))), 
                                magnifyingSize / zoom, 
                                magnifyingSize / zoom,
                                magX, magY, 
                                magnifyingSize, magnifyingSize
                            );

                            ctx.strokeStyle = '#00ff66';
                            ctx.lineWidth = 2;
                            ctx.translate(magX + magnifyingSize / 2, magY + magnifyingSize / 2);
                            ctx.scale(zoom, zoom);
                            ctx.translate(-activeCorner.x, -activeCorner.y);

                            ctx.beginPath();
                            ctx.moveTo(tableCorners[0].x, tableCorners[0].y);
                            ctx.lineTo(tableCorners[1].x, tableCorners[1].y);
                            ctx.lineTo(tableCorners[2].x, tableCorners[2].y);
                            ctx.lineTo(tableCorners[3].x, tableCorners[3].y);
                            ctx.closePath();
                            ctx.stroke();

                            ctx.restore();

                            ctx.beginPath();
                            ctx.arc(magX + magnifyingSize/2, magY + magnifyingSize/2, magnifyingSize/2, 0, Math.PI * 2);
                            ctx.strokeStyle = '#ffffff';
                            ctx.lineWidth = 3;
                            ctx.stroke();

                            ctx.beginPath();
                            ctx.moveTo(magX + magnifyingSize/2 - 10, magY + magnifyingSize/2); ctx.lineTo(magX + magnifyingSize/2 + 10, magY + magnifyingSize/2);
                            ctx.moveTo(magX + magnifyingSize/2, magY + magnifyingSize/2 - 10); ctx.lineTo(magX + magnifyingSize/2, magY + magnifyingSize/2 + 10);
                            ctx.strokeStyle = '#ff3333'; 
                            ctx.lineWidth = 1.5;
                            ctx.stroke();
                        } catch (e) {}
                    }
                }

                if (!isCalibratingMode) {
                    let angle = Math.atan2(aimY - ballY, aimX - ballX);

                    ctx.save();
                    ctx.translate(ballX, ballY);
                    ctx.rotate(angle);

                    ctx.beginPath();
                    ctx.arc(0, 0, 16, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(0, 0, 8, 0, Math.PI * 2);
                    ctx.strokeStyle = laserColor; ctx.lineWidth = 2;
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(16, 0); ctx.lineTo(maxLaserLength, 0);
                    ctx.strokeStyle = isTouching ? laserColor : hexToRgbA(laserColor, 0.4);
                    ctx.lineWidth = laserThickness;
                    ctx.stroke();

                    ctx.save();
                    ctx.translate(maxLaserLength, 0); ctx.rotate(-angle);
                    ctx.beginPath();
                    ctx.moveTo(-10, 0); ctx.lineTo(10, 0); ctx.moveTo(0, -10); ctx.lineTo(0, 10);
                    ctx.strokeStyle = laserColor; ctx.lineWidth = 2; ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(0, 0, 3, 0, Math.PI * 2); ctx.fillStyle = '#ffffff'; ctx.fill();
                    ctx.restore();

                    ctx.beginPath();
                    ctx.moveTo(-16, 0); ctx.lineTo(-120, 0);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)'; ctx.lineWidth = 2; ctx.setLineDash([4, 4]);
                    ctx.stroke();

                    ctx.restore();
                }
            }

            requestAnimationFrame(globalRenderLoop);
        }

        function hexToRgbA(hex, alpha){
            let c;
            if(/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)){
                c= hex.substring(1).split('');
                if(c.length== 3){ c= [c[0], c[0], c[1], c[1], c[2], c[2]]; }
                c= '0x'+c.join('');
                return 'rgba('+[(c>>16)&255, (c>>8)&255, c&255].join(',')+','+alpha+')';
            }
            return hex;
        }

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
                video.srcObject = stream;
            } catch (err) { console.error("Камера недоступна:", err); }
        }

        resizeCanvas();
        renderMenu();
        globalRenderLoop();
    </script>
</body>
</html>
