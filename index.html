        <button id="btnBack" class="back-btn" onclick="backToMenu()">← Назад</button>

            <span id="txtAngle">Угол</span>: <span id="angle-display">0</span>°<br>
            <small id="txtHint" style="font-size: 11px; color: #aaa;">Проведите пальцем для прицеливания</small>
        </div>
        <video id="camera" autoplay playsinline></video>
        <div class="center-dot"></div>
        <div id="laser" class="aim-line"></div>
    </div>

    <script>
        const vocab = {
            ru: { title: "DAM AI SYSTEM", billiards: "Бильярд", chess: "Шахматы (Скоро)", back: "← Назад", angle: "Угол", hint: "Проведите пальцем для прицеливания" },
            en: { title: "DAM AI SYSTEM", billiards: "Billiards", chess: "Chess (Soon)", back: "← Back", angle: "Angle", hint: "Swipe screen to aim" }
        };

        let currentLang = 'ru';
        let streamRef = null;

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('btnRu').classList.toggle('active', lang === 'ru');
            document.getElementById('btnEn').classList.toggle('active', lang === 'en');
            document.getElementById('menuTitle').textContent = vocab[lang].title;
            document.getElementById('btnBilliards').textContent = vocab[lang].billiards;
            document.getElementById('btnChess').textContent = vocab[lang].chess;
            document.getElementById('btnBack').textContent = vocab[lang].back;
            document.getElementById('txtAngle').textContent = vocab[lang].angle;
            document.getElementById('txtHint').textContent = vocab[lang].hint;
        }

        function startGame(gameType) {
            if(gameType === 'billiards') {
                document.getElementById('menuScreen').style.display = 'none';
                document.getElementById('gameScreen').style.display = 'block';
                
                const video = document.getElementById('camera');
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } })
                    .then(stream => { 
                        streamRef = stream;
                        video.srcObject = stream; 
                    })
                    .catch(err => { alert("Камера недоступна."); });
            }
        }

        function backToMenu() {
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('menuScreen').style.display = 'flex';
            if (streamRef) {
                streamRef.getTracks().forEach(track => track.stop());
                streamRef = null;
            }
        }

        // НАСТРОЙКА УПРАВЛЕНИЯ ЛАЗЕРОМ
        const laser = document.getElementById('laser');
        const angleDisplay = document.getElementById('angle-display');
        const gameScreen = document.getElementById('gameScreen'); // Нацеливаемся на экран игры
        let currentAngle = 0;
        let startX = 0;

        // ВАЖНО: Слушаем касания ТОЛЬКО на игровом экране, меню теперь свободно!
        gameScreen.addEventListener('touchstart', (e) => { 
            startX = e.touches[0].clientX; 
        });

        gameScreen.addEventListener('touchmove', (e) => {
            const touchX = e.touches[0].clientX;
            const deltaX = touchX - startX;
            currentAngle += deltaX * 0.4;
            currentAngle = (currentAngle % 360 + 360) % 360;
            laser.style.transform = translate(0, -50%) rotate(${currentAngle}deg);
            angleDisplay.textContent = Math.round(currentAngle);
            startX = touchX;
        });
    </script>
</body>
