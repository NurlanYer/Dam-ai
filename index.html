<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dam-ai — AR Multi-Game Platform</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvas-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .interactive {
            pointer-events: auto;
        }

        /* Главное Меню */
        #start-menu {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 12, 0.88);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 20px;
            overflow-y: auto;
        }

        .header-block {
            text-align: center;
            margin-top: 10px;
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .logo span {
            color: #00ff66;
            text-shadow: 0 0 20px rgba(0, 255, 102, 0.6);
        }

        .tagline {
            color: #888;
            font-size: 0.85rem;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-content {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin: 20px 0;
        }

        .category-section h2 {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 10px;
            padding-left: 5px;
            border-left: 3px solid #00ff66;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .games-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .game-card.available { border-color: rgba(0, 255, 102, 0.3); }
        .game-card.available:active { transform: scale(0.98); background: rgba(0, 255, 102, 0.08); border-color: #00ff66; }
        .game-card.locked { opacity: 0.4; cursor: not-allowed; }

        .game-info h3 { color: #fff; font-size: 1.05rem; margin-bottom: 3px; }
        .game-info p { color: #aaa; font-size: 0.8rem; }
        .game-icon { font-size: 1.4rem; }

        .footer-block { width: 100%; display: flex; justify-content: center; }

        .lang-dropdown-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.06);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lang-select {
            background: transparent;
            color: #fff;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        .lang-select option { background: #111; color: #fff; }

        /* Игровой HUD */
        #game-hud {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .hud-header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn, .settings-btn, .calibrate-btn {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .settings-btn { font-size: 1.2rem; padding: 6px 14px; }
        .calibrate-btn { border-color: rgba(0, 255, 102, 0.4); color: #00ff66; font-weight: 600; }
        .calibrate-btn.active-mode { background: #00ff66; color: #000; border-color: #00ff66; }

        .status-badge {
            background: rgba(0, 255, 102, 0.2);
            color: #00ff66;
            border: 1px solid #00ff66;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .aim-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            text-align: center;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        /* Панель Настроек лазера */
        #ar-settings-panel {
            display: none;
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 360px;
            background: rgba(15, 20, 18, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            flex-direction: column;
            gap: 15px;
        }

        .setting-item { display: flex; flex-direction: column; gap: 8px; }
        .setting-item label { color: #aaa; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

        .color-options { display: flex; gap: 12px; }
        .color-dot { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s; }
        .color-dot.active { border-color: #fff; transform: scale(1.1); }

        .thickness-slider, .length-slider { width: 100%; -webkit-appearance: none; background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; outline: none; }
        .thickness-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #00ff66; cursor: pointer; }
        .length-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #fff; cursor: pointer; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas-layer"></canvas>

    <div class="ui-layer">
        
        <div id="start-menu" class="interactive">
            <div class="header-block">
                <h1 class="logo">Dam-<span>ai</span></h1>
                <p class="tagline" id="txt-tagline">Платформа дополненной реальности</p>
            </div>

            <div class="menu-content" id="menu-games-content"></div>
            
            <div class="footer-block">
                <div class="lang-dropdown-container">
                    <span>🌐</span>
                    <select class="lang-select" id="lang-updater">
                        <option value="ru">Русский (RU)</option>
                        <option value="en">English (EN)</option>
                        <option value="es">Español (ES)</option>
                        <option value="zh">中文 (ZH)</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="game-hud">
            <div class="hud-header">
                <button class="back-btn interactive" id="btn-back">← Меню</button>
                <button class="calibrate-btn interactive" id="btn-calibrate">📐 <span id="txt-btn-calib">Разметка стола</span></button>
                <button class="settings-btn interactive" id="btn-toggle-settings">⚙️</button>
            </div>

            <div id="ar-settings-panel" class="interactive">
                <div class="setting-item">
                    <label id="lbl-color">Цвет лазера</label>
                    <div class="color-options">
                        <div class="color-dot active" style="background: #00ff66;" data-color="#00ff66"></div>
                        <div class="color-dot" style="background: #ff3333;" data-color="#ff3333"></div>
                        <div class="color-dot" style="background: #3388ff;" data-color="#3388ff"></div>
                    </div>
                </div>
                <div class="setting-item">
                    <label id="lbl-thickness">Толщина луча</label>
                    <input type="range" min="1" max="10" value="3" class="thickness-slider" id="slider-thickness">
                </div>
                <div class="setting-item">
                    <label id="lbl-length">Длина луча (Ограничение)</label>
                    <input type="range" min="100" max="1500" value="600" class="length-slider" id="slider-length">
                </div>
            </div>

            <div class="aim-hint" id="txt-hint">Загрузка модуля игры...</div>
        </div>

    </div>

    <script>
        // ==========================================
        // 1. БАЗА ДАННЫХ ЛОКАЛИЗАЦИИ
        // ==========================================
        const localization = {
            ru: {
                tagline: "Платформа дополненной реальности",
                status: "AR Активно",
                cat_billiards: "Бильярдная группа",
                cat_board: "Настольные игры",
                cat_cards: "Карточные игры",
                hint_billiards: "Тапните на биток и тяните в сторону для прицеливания",
                hint_calibrate: "Перетащите 4 светящиеся точки на углы вашего стола",
                lbl_color: "Цвет лазера",
                lbl_thickness: "Толщина луча",
                lbl_length: "Длина луча (Прицел)",
                btn_calib_start: "Разметка стола",
                btn_calib_save: "Сохранить форму"
            },
            en: {
                tagline: "Augmented Reality Platform",
                status: "AR Active",
                cat_billiards: "Billiards Group",
                cat_board: "Board Games",
                cat_cards: "Card Games",
                hint_billiards: "Tap on the cue ball and drag to aim",
                hint_calibrate: "Drag 4 glowing points to the corners of your table",
                lbl_color: "Laser Color",
                lbl_thickness: "Beam Thickness",
                lbl_length: "Laser Length",
                btn_calib_start: "Table Setup",
                btn_calib_save: "Save Borders"
            }
        };

        const gameTitles = {
            ru: {
                billiards_free: { title: "Свободная тренировка", desc: "Умный лазерный прицел" },
                billiards_carom: { title: "Карамболь (Тройка)", desc: "Траектории от трех бортов" }
            },
            en: {
                billiards_free: { title: "Free Training", desc: "Smart laser aiming assist" },
                billiards_carom: { title: "Carom (3-Cushion)", desc: "3-cushion bounce trajectories" }
            }
        };

        const gameStructure = [
            { categoryKey: "cat_billiards", games: [{ id: "billiards_free", icon: "🎯", available: true }, { id: "billiards_carom", icon: "🔒", available: false }] },
            { categoryKey: "cat_board", games: [{ id: "chess", icon: "🔒", available: false }, { id: "checkers", icon: "🔒", available: false }] },
            { categoryKey: "cat_cards", games: [{ id: "poker", icon: "🔒", available: false }] }
        ];

        let currentLang = 'ru';
        let currentActiveGame = null;

        const menuContainer = document.getElementById('menu-games-content');
        const langUpdater = document.getElementById('lang-updater');
        const startMenu = document.getElementById('start-menu');
        const gameHud = document.getElementById('game-hud');
        const btnBack = document.getElementById('btn-back');
        const canvas = document.getElementById('canvas-layer');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('webcam');

        // Настройки AR лазера
        let laserColor = "#00ff66";
        let laserThickness = 3;
        let maxLaserLength = 600;

        // Состояния режимов
        let isCalibratingMode = false; // Режим калибровки стола включен/выключен

        // Координаты углов стола (Изначально раскиданы прямоугольником по центру экрана)
        let tableCorners = [
            { x: 100, y: 150, id: 0 }, // Верхний левый
            { x: 300, y: 150, id: 1 }, // Верхний правый
            { x: 300, y: 450, id: 2 }, // Нижний правый
            { x: 100, y: 450, id: 3 }  // Нижний левый
        ];
        let draggedCorner = null; // Индекс угла, который сейчас тащит палец

        const btnToggleSettings = document.getElementById('btn-toggle-settings');
        const arSettingsPanel = document.getElementById('ar-settings-panel');
        const sliderThickness = document.getElementById('slider-thickness');
        const sliderLength = document.getElementById('slider-length');
        const btnCalibrate = document.getElementById('btn-calibrate');
        const txtBtnCalib = document.getElementById('txt-btn-calib');

        function renderMenu() {
            menuContainer.innerHTML = '';
            gameStructure.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'category-section';
                const catTitle = document.createElement('h2');
                catTitle.innerText = localization[currentLang][cat.categoryKey] || cat.categoryKey;
                section.appendChild(catTitle);
                
                const list = document.createElement('div');
                list.className = 'games-list';
                
                cat.games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = `game-card ${game.available ? 'available' : 'locked'} interactive`;
                    const textData = (gameTitles[currentLang] && gameTitles[currentLang][game.id]) ? gameTitles[currentLang][game.id] : {title: game.id, desc: ""};
                    card.innerHTML = `
                        <div class="game-info">
                            <h3>${textData.title}</h3>
                            <p>${textData.desc}</p>
                        </div>
                        <div class="game-icon">${game.icon}</div>
                    `;
                    if(game.available) {
                        card.addEventListener('click', () => launchGameModule(game.id));
                    }
                    list.appendChild(card);
                });
                section.appendChild(list);
                menuContainer.appendChild(section);
            });
            document.getElementById('txt-tagline').innerText = localization[currentLang].tagline;
            document.getElementById('lbl-color').innerText = localization[currentLang].lbl_color;
            document.getElementById('lbl-thickness').innerText = localization[currentLang].lbl_thickness;
            document.getElementById('lbl-length').innerText = localization[currentLang].lbl_length;
            updateCalibrateButtonText();
        }

        function updateCalibrateButtonText() {
            txtBtnCalib.innerText = isCalibratingMode ? localization[currentLang].btn_calib_save : localization[currentLang].btn_calib_start;
        }

        langUpdater.addEventListener('change', (e) => {
            currentLang = e.target.value;
            renderMenu();
        });

        btnToggleSettings.addEventListener('click', () => {
            arSettingsPanel.style.display = arSettingsPanel.style.display === 'flex' ? 'none' : 'flex';
        });

        // Переключение режима Калибровки/Разметки стола
        btnCalibrate.addEventListener('click', () => {
            isCalibratingMode = !isCalibratingMode;
            if (isCalibratingMode) {
                btnCalibrate.classList.add('active-mode');
                document.getElementById('txt-hint').innerText = localization[currentLang].hint_calibrate;
                arSettingsPanel.style.display = 'none'; // Закрываем шестеренку, чтоб не мешала
            } else {
                btnCalibrate.classList.remove('active-mode');
                document.getElementById('txt-hint').innerText = localization[currentLang].hint_billiards;
            }
            updateCalibrateButtonText();
        });

        sliderThickness.addEventListener('input', (e) => { laserThickness = parseInt(e.target.value); });
        sliderLength.addEventListener('input', (e) => { maxLaserLength = parseInt(e.target.value); });
        
        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', (e) => {
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                e.target.classList.add('active');
                laserColor = e.target.getAttribute('data-color');
            });
        });

        function launchGameModule(gameId) {
            currentActiveGame = gameId;
            initCamera();
            startMenu.style.display = 'none';
            gameHud.style.display = 'block';
            
            // Расставляем базовые углы разметки под размер экрана
            tableCorners = [
                { x: window.innerWidth * 0.15, y: window.innerHeight * 0.25 },
                { x: window.innerWidth * 0.85, y: window.innerHeight * 0.25 },
                { x: window.innerWidth * 0.85, y: window.innerHeight * 0.75 },
                { x: window.innerWidth * 0.15, y: window.innerHeight * 0.75 }
            ];

            if (gameId === 'billiards_free') {
                document.getElementById('txt-hint').innerText = localization[currentLang].hint_billiards;
                canvas.style.pointerEvents = 'auto';
                initBilliardsFreeLogic();
            }
        }

        function closeActiveModule() {
            isBilliardsAiming = false;
            isCalibratingMode = false;
            btnCalibrate.classList.remove('active-mode');
            currentActiveGame = null;
            startMenu.style.display = 'flex';
            gameHud.style.display = 'none';
            arSettingsPanel.style.display = 'none';
            canvas.style.pointerEvents = 'none';
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        }

        btnBack.addEventListener('click', closeActiveModule);

        // ==========================================
        // 4. ЛОГИКА ТАЧ-СОБЫТИЙ С УЧЕТОМ РАЗМЕТКИ СТОЛА
        // ==========================================
        let isBilliardsAiming = false;
        let ballX = 0, ballY = 0;
        let aimX = 0, aimY = 0;
        let isTouching = false; 

        function initBilliardsFreeLogic() {
            isBilliardsAiming = true;
            ballX = canvas.width / 2;
            ballY = canvas.height / 2;
            aimX = ballX;
            aimY = ballY - 100;
            isTouching = false;
        }

        canvas.addEventListener('touchstart', (e) => {
            if(!isBilliardsAiming) return;
            const touch = e.touches[0];
            const tX = touch.clientX;
            const tY = touch.clientY;

            // РЕЖИМ РАЗМЕТКИ СТОЛА: Проверяем, нажал ли пользователь на один из 4 углов
            if (isCalibratingMode) {
                draggedCorner = null;
                for (let i = 0; i < tableCorners.length; i++) {
                    let dist = Math.hypot(tableCorners[i].x - tX, tableCorners[i].y - tY);
                    if (dist < 35) { // Радиус захвата точки пальцем — 35 пикселей
                        draggedCorner = i;
                        break;
                    }
                }
                return;
            }

            // ОБЫЧНЫЙ РЕЖИМ ИГРЫ: Управление лазером
            if (arSettingsPanel.style.display === 'flex' && tY > arSettingsPanel.offsetTop) return;
            ballX = tX;
            ballY = tY;
            aimX = tX;
            aimY = tY;
            isTouching = true;
        });

        canvas.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const tX = touch.clientX;
            const tY = touch.clientY;

            if (isCalibratingMode) {
                if (draggedCorner !== null) {
                    tableCorners[draggedCorner].x = tX;
                    tableCorners[draggedCorner].y = tY;
                }
                e.preventDefault();
                return;
            }

            if(!isBilliardsAiming || !isTouching) return;
            aimX = tX;
            aimY = tY;
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', () => { 
            isTouching = false; 
            draggedCorner = null; // Отпускаем угол стола
        });

        // ==========================================
        // 5. ГЛОВБАЛЬНЫЙ ЦИКЛ ОТРИСОВКИ СЕТКИ СТОЛА И ЛАЗЕРА
        // ==========================================
        function globalRenderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (currentActiveGame === 'billiards_free' && isBilliardsAiming) {
                
                // 1. Всегда рисуем рамку стола, если мы в игре
                ctx.beginPath();
                ctx.moveTo(tableCorners[0].x, tableCorners[0].y);
                ctx.lineTo(tableCorners[1].x, tableCorners[1].y);
                ctx.lineTo(tableCorners[2].x, tableCorners[2].y);
                ctx.lineTo(tableCorners[3].x, tableCorners[3].y);
                ctx.closePath();
                
                // В режиме разметки рамка ярко горит, в игре — мягко подсвечивает игровое поле
                ctx.strokeStyle = isCalibratingMode ? '#00ff66' : 'rgba(255, 255, 255, 0.15)';
                ctx.lineWidth = isCalibratingMode ? 3 : 1;
                if (isCalibratingMode) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#00ff66';
                } else {
                    ctx.shadowBlur = 0;
                }
                ctx.stroke();

                // 2. Если включен режим разметки — рисуем 4 круглых маркера на углах
                if (isCalibratingMode) {
                    tableCorners.forEach((corner, i) => {
                        ctx.beginPath();
                        ctx.arc(corner.x, corner.y, 14, 0, Math.PI * 2);
                        ctx.fillStyle = i === draggedCorner ? '#ffffff' : 'rgba(0, 255, 102, 0.8)';
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = 2;
                        ctx.fill();
                        ctx.stroke();
                        
                        // Внутренний прицельный крестик в углу
                        ctx.beginPath();
                        ctx.moveTo(corner.x - 6, corner.y); ctx.lineTo(corner.x + 6, corner.y);
                        ctx.moveTo(corner.x, corner.y - 6); ctx.lineTo(corner.x, corner.y + 6);
                        ctx.strokeStyle = '#000000';
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    });
                }

                // 3. ОТРИСОВКА ЛАЗЕРА (Рисуется, только когда НЕ размечаем стол)
                if (!isCalibratingMode) {
                    let angle = Math.atan2(aimY - ballY, aimX - ballX);

                    ctx.save();
                    ctx.translate(ballX, ballY);
                    ctx.rotate(angle);

                    // Белый шар (биток)
                    ctx.beginPath();
                    ctx.arc(0, 0, 16, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#ffffff';
                    ctx.fill();

                    // Кольцо цвета лазера внутри шара
                    ctx.beginPath();
                    ctx.arc(0, 0, 8, 0, Math.PI * 2);
                    ctx.strokeStyle = laserColor;
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // Луч лазера
                    ctx.beginPath();
                    ctx.moveTo(16, 0); 
                    ctx.lineTo(maxLaserLength, 0);
                    ctx.strokeStyle = isTouching ? laserColor : hexToRgbA(laserColor, 0.4);
                    ctx.lineWidth = laserThickness; 
                    ctx.shadowBlur = isTouching ? 15 : 5;
                    ctx.shadowColor = laserColor;
                    ctx.stroke();

                    // Перекрестие мишени
                    ctx.save();
                    ctx.translate(maxLaserLength, 0);
                    ctx.rotate(-angle);
                    ctx.beginPath();
                    ctx.moveTo(-10, 0); ctx.lineTo(10, 0);
                    ctx.moveTo(0, -10); ctx.lineTo(0, 10);
                    ctx.strokeStyle = laserColor;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(0, 0, 3, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.restore();

                    // Пунктирный кий назад
                    ctx.beginPath();
                    ctx.moveTo(-16, 0); ctx.lineTo(-120, 0);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([4, 4]);
                    ctx.stroke();

                    ctx.restore();
                }
            }

            requestAnimationFrame(globalRenderLoop);
        }

        function hexToRgbA(hex, alpha){
            let c;
            if(/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)){
                c= hex.substring(1).split('');
                if(c.length== 3){ c= [c[0], c[0], c[1], c[1], c[2], c[2]]; }
                c= '0x'+c.join('');
                return 'rgba('+[(c>>16)&255, (c>>8)&255, c&255].join(',')+','+alpha+')';
            }
            return hex;
        }

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
                video.srcObject = stream;
            } catch (err) { console.error("Камера недоступна:", err); }
        }

        resizeCanvas();
        renderMenu();
        globalRenderLoop();
    </script>
</body>
</html>
