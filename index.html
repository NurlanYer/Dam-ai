currentAngle += deltaX * 0.4;
                currentAngle = (currentAngle % 360 + 360) % 360;
                laser.style.transform = translate(0, -50%) rotate(${currentAngle}deg);
                angleDisplay.textContent = Math.round(currentAngle);
                startX = touchX;
            }
        });
    </script>
</body>
</html>
