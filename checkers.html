<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dam-ai — Шашки AR</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; }
        .ai-status { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 20px; color: #0f0; }
        .hint { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 15px; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="video-container"><video id="webcam" autoplay playsinline muted></video></div>
    <canvas id="canvas-layer"></canvas>
    <div class="hud">
        <div class="ai-status" id="engine-status">ИИ-зрение: поиск...</div>
        <div class="hint" id="txt-hint">Стабилизация активна</div>
    </div>

    <script async src="https://docs.opencv.org/4.5.0/opencv.js"></script>
    <script>
        const video = document.getElementById('webcam');
        let src, gray, corners, smoothedCorners = null;
        let isTracked = false;
        let roiRect = null; // Область интереса для быстрого трекинга

        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
            await video.play();
            requestAnimationFrame(processVideo);
        }

        function processVideo() {
            if (!cv || !cv.Mat) { requestAnimationFrame(processVideo); return; }
            src = new cv.Mat(video.height, video.width, cv.CV_8UC4);
            gray = new cv.Mat(video.height, video.width, cv.CV_8UC1);
            corners = new cv.Mat();

            function loop() {
                let cap = new cv.VideoCapture(video);
                cap.read(src);
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                
                // Если доска найдена, ищем в ROI, иначе — во всем кадре
                let searchArea = isTracked ? gray.roi(roiRect) : gray;
                let found = cv.findChessboardCorners(searchArea, new cv.Size(7, 7), corners);
                
                if (found) {
                    isTracked = true;
                    // Обновляем ROI для следующего кадра (увеличиваем область на 50px)
                    roiRect = new cv.Rect(0, 0, video.width, video.height); 
                    document.getElementById('engine-status').innerText = "Стабилизация: ON";
                    warpPerspectiveBoard(src, corners);
                } else {
                    isTracked = false;
                    document.getElementById('engine-status').innerText = "Поиск доски...";
                }
                if (searchArea !== gray) searchArea.delete();
                requestAnimationFrame(loop);
            }
            loop();
        }

        function applySmoothing(newCorners) {
            if (!smoothedCorners) smoothedCorners = new Float32Array(newCorners);
            for (let i = 0; i < newCorners.length; i++) 
                smoothedCorners[i] = (0.2 * newCorners[i]) + (0.8 * smoothedCorners[i]);
            return smoothedCorners;
        }

        function warpPerspectiveBoard(srcFrame, boardCorners) {
            let rawPoints = [boardCorners.data32F[0], boardCorners.data32F[1], boardCorners.data32F[12], boardCorners.data32F[13], boardCorners.data32F[96], boardCorners.data32F[97], boardCorners.data32F[84], boardCorners.data32F[85]];
            let stable = applySmoothing(rawPoints);
            
            let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, stable);
            let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, 400, 0, 400, 400, 0, 400]);
            let M = cv.getPerspectiveTransform(srcTri, dstTri);
            let warped = new cv.Mat();
            cv.warpPerspective(srcFrame, warped, M, new cv.Size(400, 400));
            
            // Здесь будет отрисовка доски
            srcTri.delete(); dstTri.delete(); M.delete(); warped.delete();
        }

        window.onload = () => setTimeout(initCamera, 1000);
    </script>
</body>
</html>
