<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dam-ai Debugger</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #error-log { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: rgba(255, 0, 0, 0.8); color: #fff; padding: 15px; 
            border-radius: 10px; font-family: monospace; z-index: 100; 
            max-width: 80%; text-align: center; display: none;
        }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline muted></video>
    <div id="error-log"></div>

    <script>
        const errorLog = document.getElementById('error-log');
        
        function showError(msg) {
            errorLog.innerText = "ОШИБКА: " + msg;
            errorLog.style.display = 'block';
            console.error(msg);
        }

        async function init() {
            try {
                // 1. Проверка поддержки медиа-устройств
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error("Ваш браузер не поддерживает доступ к камере.");
                }

                // 2. Запрос камеры
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                document.getElementById('webcam').srcObject = stream;
                
            } catch (err) {
                showError(err.name + ": " + err.message);
            }
        }

        // Автозапуск
        window.onload = init;
    </script>
</body>
</html>
