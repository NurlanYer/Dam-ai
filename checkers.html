<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dam-ai Final Fix</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        #log { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px; z-index: 50; border: 1px solid #0f0; }
    </style>
</head>
<body>
    <div id="log">Запуск...</div>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas-layer"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.min.js"></script>
    <script>
        const log = document.getElementById('log');
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas-layer');
        const ctx = canvas.getContext('2d');
        let src, gray;

        function updateLog(msg) { log.innerText = msg; }

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    // Создаем матрицы СТРОГО после получения размеров
                    src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    gray = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC1);
                    updateLog("Размеры заданы: " + video.videoWidth + "x" + video.videoHeight);
                    processVideo();
                };
            } catch (err) {
                updateLog("Ошибка камеры: " + err.message);
            }
        }

        function processVideo() {
            let cap = new cv.VideoCapture(video);
            function loop() {
                try {
                    cap.read(src);
                    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // Рисуем индикатор работы
                    ctx.strokeStyle = '#0f0';
                    ctx.lineWidth = 5;
                    ctx.strokeRect(20, 20, 100, 100);
                    
                    requestAnimationFrame(loop);
                } catch (e) {
                    updateLog("Loop error: " + e.message);
                }
            }
            loop();
        }

        window.onload = init;
    </script>
</body>
</html>
