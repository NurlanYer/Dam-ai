<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dam-ai — Шашки AR</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        .hud { position: absolute; top: 20px; left: 20px; z-index: 3; }
        .status { background: rgba(0,0,0,0.7); padding: 12px; border-radius: 20px; color: #0f0; border: 1px solid #0f0; }
    </style>
</head>
<body>
    <div id="video-container"><video id="webcam" autoplay playsinline muted></video></div>
    <canvas id="canvas-layer"></canvas>
    <div class="hud"><div class="status" id="engine-status">Загрузка...</div></div>

    <script async src="https://docs.opencv.org/4.5.0/opencv.js"></script>
    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas-layer');
        const ctx = canvas.getContext('2d');
        let src, gray, corners, smoothedCorners = null;
        let boardState = Array(8).fill(null).map(() => Array(8).fill(0));

        // ... (функции initCamera и processVideo остаются прежними)

        function analyzeCells(warpedMat) {
            let cellSize = 400 / 8;
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Очистка экрана

            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    // Берем центр ячейки
                    let rect = new cv.Rect(col * cellSize + 10, row * cellSize + 10, cellSize - 20, cellSize - 20);
                    let cell = warpedMat.roi(rect);
                    let brightness = cv.mean(cell)[0];

                    // Логика цвета: шашка темная или светлая
                    if (brightness < 70) {
                        boardState[row][col] = 1; // Темная шашка
                        drawHint(col * cellSize + cellSize/2, row * cellSize + cellSize/2, '#555');
                    } else if (brightness > 180) {
                        boardState[row][col] = 2; // Светлая шашка
                        drawHint(col * cellSize + cellSize/2, row * cellSize + cellSize/2, '#fff');
                    } else {
                        boardState[row][col] = 0; // Пусто
                    }
                    cell.delete();
                }
            }
        }

        function drawHint(x, y, color) {
            ctx.beginPath();
            ctx.arc(x, y, 15, 0, 2 * Math.PI);
            ctx.strokeStyle = color;
            ctx.lineWidth = 5;
            ctx.stroke();
        }

        // ... (остальные функции: warpAndAnalyze, loop и т.д.)
    </script>
</body>
</html>
