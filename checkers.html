<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dam-ai AR Full Debug</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        #log { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px; z-index: 50; border: 1px solid #0f0; }
    </style>
</head>
<body>
    <div id="log">Старт...</div>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas-layer"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.min.js"></script>
    <script>
        const log = document.getElementById('log');
        const video = document.getElementById('webcam');
        
        function updateLog(msg) { log.innerText = msg; console.log(msg); }

        async function init() {
            updateLog("Запрос камеры...");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                updateLog("Камера получена. Ждем метаданные...");
                
                // Принудительный старт через 2 секунды, если событие не сработает
                setTimeout(() => {
                    if (video.videoWidth === 0) {
                        updateLog("Видео не загрузилось. Пробую запуск...");
                        startProcessing();
                    }
                }, 2000);

                video.onloadedmetadata = () => {
                    updateLog("Метаданные получены: " + video.videoWidth + "x" + video.videoHeight);
                    startProcessing();
                };
            } catch (err) {
                updateLog("Ошибка камеры: " + err.message);
            }
        }

        function startProcessing() {
            updateLog("Запуск OpenCV...");
            if (typeof cv === 'undefined') { updateLog("Критическая ошибка: OpenCV не загружен!"); return; }
            
            const canvas = document.getElementById('canvas-layer');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            
            let src = new cv.Mat(canvas.height, canvas.width, cv.CV_8UC4);
            let cap = new cv.VideoCapture(video);

            function loop() {
                try {
                    cap.read(src);
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // Рисуем рамку, чтобы видеть, что цикл идет
                    ctx.strokeStyle = 'red';
                    ctx.lineWidth = 5;
                    ctx.strokeRect(50, 50, 100, 100);
                    
                    requestAnimationFrame(loop);
                } catch (e) {
                    updateLog("Ошибка цикла: " + e.message);
                }
            }
            loop();
        }

        window.onload = init;
    </script>
</body>
</html>
