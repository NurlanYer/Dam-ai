        .ai-status { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 20px; color: #0f0; }
        .hint { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 15px; border-radius: 20px; }
    </style>
</head>

                    warpPerspectiveBoard(src, corners);
                } else {
                    document.getElementById('engine-status').innerText = "Поиск доски...";
                }
                requestAnimationFrame(loop);
            }
            loop();
        }

            for (let i = 0; i < newCorners.length; i++)
