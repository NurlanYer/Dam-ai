<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dam-ai AR Full Control</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #error-log { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
                     background: rgba(255, 0, 0, 0.8); color: #fff; padding: 15px; border-radius: 10px; 
                     font-family: monospace; z-index: 100; display: none; text-align: center; }
        #status { position: absolute; top: 10px; left: 10px; color: #0f0; background: rgba(0,0,0,0.5); padding: 5px; }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas-layer"></canvas>
    <div id="status">Инициализация...</div>
    <div id="error-log"></div>

    <script src="https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.min.js"></script>
    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas-layer');
        const ctx = canvas.getContext('2d');
        const errorLog = document.getElementById('error-log');
        const status = document.getElementById('status');

        function showError(msg) { errorLog.innerText = msg; errorLog.style.display = 'block'; }

        async function init() {
            try {
                // 1. Проверка OpenCV
                if (typeof cv === 'undefined') throw new Error("OpenCV не загрузился!");
                
                // 2. Доступ к камере
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                await video.play();
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                status.innerText = "Система активна. Ищем доску...";
                
                processVideo();
            } catch (err) {
                showError(err.message);
            }
        }

        function processVideo() {
            let src = new cv.Mat(video.height, video.width, cv.CV_8UC4);
            let gray = new cv.Mat(video.height, video.width, cv.CV_8UC1);
            let corners = new cv.Mat();
            let cap = new cv.VideoCapture(video);

            function loop() {
                cap.read(src);
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                cv.adaptiveThreshold(gray, gray, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY, 11, 2);
                
                let found = cv.findChessboardCorners(gray, new cv.Size(7, 7), corners);
                
                if (found) {
                    status.innerText = "Статус: Доска найдена";
                    drawOverlay(corners);
                } else {
                    status.innerText = "Статус: Поиск доски...";
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
                requestAnimationFrame(loop);
            }
            loop();
        }

        function drawOverlay(corners) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let data = corners.data32F;
            ctx.strokeStyle = '#0f0'; ctx.lineWidth = 4;
            for(let i=0; i<data.length; i+=2) {
                ctx.beginPath(); ctx.arc(data[i], data[i+1], 10, 0, 2 * Math.PI); ctx.stroke();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
