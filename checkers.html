<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dam-ai Universal AR</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        #status { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.5); padding: 10px; z-index: 10; }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas-layer"></canvas>
    <div id="status">Инициализация...</div>

    <script src="https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.min.js"></script>
    <script>
        const video = document.getElementById('webcam'), canvas = document.getElementById('canvas-layer'), ctx = canvas.getContext('2d');
        
        async function init() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                processVideo();
            };
        }

        function processVideo() {
            let src = new cv.Mat(video.height, video.width, cv.CV_8UC4);
            let gray = new cv.Mat(video.height, video.width, cv.CV_8UC1);
            let binary = new cv.Mat();
            let contours = new cv.MatVector();
            let hierarchy = new cv.Mat();

            function loop() {
                let cap = new cv.VideoCapture(video); cap.read(src);
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                
                // Адаптивный порог - лучше всего работает при засветах и тенях
                cv.adaptiveThreshold(gray, binary, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);

                // Поиск контуров доски
                cv.findContours(binary, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let maxArea = 0, bestContour = null;
                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);
                    if (area > 5000 && area > maxArea) {
                        maxArea = area;
                        bestContour = cnt;
                    }
                }

                if (bestContour) {
                    document.getElementById('status').innerText = "Доска обнаружена (Контурный метод)";
                    drawBoard(bestContour);
                } else {
                    document.getElementById('status').innerText = "Ищем доску...";
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
                requestAnimationFrame(loop);
            }
            loop();
        }

        function drawBoard(cnt) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let rect = cv.boundingRect(cnt);
            ctx.strokeStyle = '#00FF00';
            ctx.lineWidth = 5;
            ctx.strokeRect(rect.x, rect.y, rect.width, rect.height);
        }

        window.onload = init;
    </script>
</body>
</html>
