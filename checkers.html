<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dam-ai — Шашки AR</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #0d0f12; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .header { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: rgba(0, 0, 0, 0.75); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 18px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 5px; text-decoration: none; }
        
        .ai-status { background: rgba(0, 0, 0, 0.75); border: 1px solid rgba(0, 255, 102, 0.3); padding: 8px 16px; border-radius: 20px; color: #00ff66; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .pulse-dot { width: 8px; height: 8px; background-color: #00ff66; border-radius: 50%; animation: pulse 1.5s infinite; }
        .pulse-dot.loading { background-color: #ffcc00; animation: pulse 1s infinite; }
        .pulse-dot.error { background-color: #ff3333; animation: none; }
        
        .hint { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.85); color: #fff; padding: 12px 24px; border-radius: 24px; font-size: 0.9rem; text-align: center; max-width: 90%; line-height: 1.4; border: 1px solid rgba(255,255,255,0.1); }
        
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.7); }
            70% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 6px rgba(0, 255, 102, 0); }
            100% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 255, 102, 0); }
        }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>
    
    <canvas id="canvas-layer"></canvas>

    <div class="hud">
        <div class="header">
            <a href="./" class="btn interactive">←  Меню</a>
            <div class="ai-status">
                <div id="status-indicator" class="pulse-dot loading"></div>
                <span id="engine-status">CV: Загрузка ИИ-зрения...</span>
            </div>
        </div>
        <div class="hint" id="txt-hint">Инициализация камеры и модулей автоопределения доски...</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas-layer');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('webcam');
        
        let src = null;
        let dst = null;
        let cvReady = false;
        let cameraReady = false;

        // Переменные адаптивного трекера
        let isTracked = false;
        let oldGray = null;
        let p0 = null;
        let p1 = null;
        const boardWarpSize = 400; 

        // Матрица виртуального состояния доски (0 - пусто, 1 - белая шашка, 2 - темная шашка)
        let boardState = Array(8).fill(null).map(() => Array(8).fill(0));

        // 1. Включение камеры
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment', 
                        width: { ideal: 640 }, 
                        height: { ideal: 480 } 
                    }, 
                    audio: false 
                });
                video.srcObject = stream;
                
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play().then(resolve);
                    };
                });
                
                cameraReady = true;
                checkReadyToStart();
            } catch (err) {
                console.error("Ошибка доступа к камере:", err);
                document.getElementById('status-indicator').className = "pulse-dot error";
                document.getElementById('engine-status').innerText = "Ошибка камеры";
                document.getElementById('txt-hint').innerText = "Пожалуйста, разрешите доступ к камере в настройках и обновите страницу.";
            }
        }

        // 2. Проверка готовности OpenCV
        var Module = {
            onRuntimeInitialized: function() {
                cvReady = true;
                checkReadyToStart();
            }
        };

        function checkReadyToStart() {
            if (cvReady && cameraReady) {
                const dot = document.getElementById('status-indicator');
                dot.classList.remove('loading');
                document.getElementById('engine-status').innerText = "CV: Сканирование активно";
                document.getElementById('txt-hint').innerText = "Положите доску по центру экрана под любым углом.";
                
                const width = video.videoWidth || 640;
                const height = video.videoHeight || 480;
                
                src = new cv.Mat(height, width, cv.CV_8UC4);
                dst = new cv.Mat(height, width, cv.CV_8UC1);
                oldGray = new cv.Mat();
                p0 = new cv.Mat();
                p1 = new cv.Mat();
                
                requestAnimationFrame(processVideo);
            }
        }

        // Алгоритм: группировка и фильтрация узоров доски в сетку 9x9 (81 точка)
        function filterAndStructureGrid(detectedCorners, outputPoints) {
            if (detectedCorners.rows < 81) return false;

            let pointsArray = [];
            for (let i = 0; i < detectedCorners.rows; i++) {
                pointsArray.push({ x: detectedCorners.data32F[i * 2], y: detectedCorners.data32F[i * 2 + 1] });
            }

            pointsArray.sort((a, b) => a.y - b.y);

            let rows = [];
            let currentRow = [pointsArray[0]];
            let yThreshold = 15; 

            for (let i = 1; i < pointsArray.length; i++) {
                if (Math.abs(pointsArray[i].y - currentRow[0].y) < yThreshold) {
                    currentRow.push(pointsArray[i]);
                } else {
                    rows.push(currentRow);
                    currentRow = [pointsArray[i]];
                }
            }
            rows.push(currentRow);

            let validRows = rows.filter(r => r.length >= 9);
            if (validRows.length < 9) return false;

            let finalGrid = [];
            for (let i = 0; i < 9; i++) {
                validRows[i].sort((a, b) => a.x - b.x);
                for (let j = 0; j < 9; j++) {
                    finalGrid.push(validRows[i][j].x);
                    finalGrid.push(validRows[i][j].y);
                }
            }

            let tmpMat = cv.matFromArray(81, 1, cv.CV_32FC2, finalGrid);
            tmpMat.copyTo(outputPoints);
            tmpMat.delete();
            return true;
        }

        // Выпрямление перспективы
        function warpPerspectiveBoard(srcFrame, boardCorners) {
            let srcCoords = [
                boardCorners.data32F[0], boardCorners.data32F[1],       
                boardCorners.data32F[8 * 2], boardCorners.data32F[8 * 2 + 1], 
                boardCorners.data32F[80 * 2], boardCorners.data32F[80 * 2 + 1], 
                boardCorners.data32F[72 * 2], boardCorners.data32F[72 * 2 + 1]  
            ];

            let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, srcCoords);
            let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
                0, 0,
                boardWarpSize, 0,
                boardWarpSize, boardWarpSize,
                0, boardWarpSize
            ]);

            let M = cv.getPerspectiveTransform(srcTri, dstTri);
            let warped = new cv.Mat();
            cv.warpPerspective(srcFrame, warped, M, new cv.Size(boardWarpSize, boardWarpSize));

            detectCheckersOnFlatBoard(warped);

            srcTri.delete();
            dstTri.delete();
            M.delete();
            warped.delete();
        }

        // ИИ-анализатор клеток
        function detectCheckersOnFlatBoard(warpedMat) {
            let cellSize = boardWarpSize / 8; 

            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    if ((row + col) % 2 === 1) {
                        let x = col * cellSize + (cellSize - 16) / 2;
                        let y = row * cellSize + (cellSize - 16) / 2;
                        let rect = new cv.Rect(x, y, 16, 16);
                        let cellRoi = warpedMat.roi(rect);
                        
                        let meanColor = cv.mean(cellRoi); 
                        let brightness = meanColor[0]; 

                        if (brightness < 70) {
                            boardState[row][col] = 2; // Темная шашка
                        } else if (brightness > 165) {
                            boardState[row][col] = 1; // Светлая шашка
                        } else {
                            boardState[row][col] = 0; // Пусто
                        }

                        cellRoi.delete();
                    } else {
                        boardState[row][col] = 0; 
                    }
                }
            }

            calculateAndDrawMoves();
        }

        // Расчет ходов и AR-подсветка
        function calculateAndDrawMoves() {
            if (!src) return; // Безопасная проверка, чтобы скрипт не падал при запуске
            
            const scaleX = canvas.width / src.cols;
            const scaleY = canvas.height / src.rows;
            let cellSize = boardWarpSize / 8;

            let hasMoves = false;

            for (let r = 0; r < 7; r++) { 
                for (let c = 0; c < 8; c++) {
                    if (boardState[r][c] === 2) { 
                        if (c + 1 < 8 && boardState[r + 1][c + 1] === 0) {
                            drawNeonTargetCircle(r + 1, c + 1, scaleX, scaleY, cellSize);
                            hasMoves = true;
                        }
                        if (c - 1 >= 0 && boardState[r + 1][c - 1] === 0) {
                            drawNeonTargetCircle(r + 1, c - 1, scaleX, scaleY, cellSize);
                            hasMoves = true;
                        }
                    }
                }
            }

            if (hasMoves) {
                document.getElementById('txt-hint').innerText = "Анализ завершен. Доступные ходы подсвечены голубым.";
            } else {
                document.getElementById('txt-hint').innerText = "Доска распознана. Сделайте ход или поменяйте позицию.";
            }
        }

        // Проекция координат на экран смартфона
        function drawNeonTargetCircle(row, col, scaleX, scaleY, cellSize) {
            if (!p0 || !p0.data32F) return;

            let targetX = col * cellSize + cellSize / 2;
            let targetY = row * cellSize + cellSize / 2;

            let normX = targetX / boardWarpSize;
            let normY = targetY / boardWarpSize;

            let topX = p0.data32F[0] + (p0.data32F[8 * 2] - p0.data32F[0]) * normX;
            let topY = p0.data32F[1] + (p0.data32F[8 * 2 + 1] - p0.data32F[1]) * normX;
            let bottomX = p0.data32F[72 * 2] + (p0.data32F[80 * 2] - p0.data32F[72 * 2]) * normX;
            let bottomY = p0.data32F[72 * 2 + 1] + (p0.data32F[80 * 2 + 1] - p0.data32F[72 * 2 + 1]) * normX;

            let finalScreenX = (topX + (bottomX - topX) * normY) * scaleX;
            let finalScreenY = (topY + (bottomY - topY) * normY) * scaleY;

            ctx.shadowColor = "#00ffff";
            ctx.shadowBlur = 12;
            ctx.fillStyle = "rgba(0, 255, 255, 0.7)";
            ctx.beginPath();
            ctx.arc(finalScreenX, finalScreenY, cellSize * scaleX * 0.35, 0, 2 * Math.PI);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // 3. Основной цикл обработки кадров
        function processVideo() {
            if (!cvReady || !cameraReady || !src) return;

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            src.data.set(imageData.data);

            let gray = new cv.Mat();
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

            try {
                if (!isTracked) {
                    let corners = new cv.Mat();
                    
                    // Маска для фокусировки в центре (70% экрана)
                    let mask = new cv.Mat.zeros(gray.rows, gray.cols, cv.CV_8UC1);
                    let rect = new cv.Rect(gray.cols * 0.15, gray.rows * 0.15, gray.cols * 0.7, gray.rows * 0.7);
                    let roi = mask.roi(rect);
                    roi.setTo(new cv.Scalar(255));

                    cv.goodFeaturesToTrack(gray, corners, 140, 0.04, 8, mask);

                    if (filterAndStructureGrid(corners, p0)) {
                        isTracked = true;
                        gray.copyTo(oldGray);
                        document.getElementById('status-indicator').className = "pulse-dot";
                        document.getElementById('engine-status').innerText = "CV: Трекинг активен";
                    }
                    
                    corners.delete();
                    mask.delete();
                    roi.delete();
                    
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                } else {
                    let status = new cv.Mat();
                    let err = new cv.Mat();

                    cv.calcOpticalFlowPyrLK(oldGray, gray, p0, p1, status, err);

                    let trackedPointsCount = 0;
                    for (let i = 0; i < status.rows; i++) {
                        if (status.data[i] === 1) trackedPointsCount++;
                    }

                    if (trackedPointsCount >= 70) {
                        p1.copyTo(p0);
                        gray.copyTo(oldGray);

                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.strokeStyle = "#00ff66";
                        ctx.lineWidth = 3;
                        
                        const scaleX = canvas.width / src.cols;
                        const scaleY = canvas.height / src.rows;

                        ctx.beginPath();
                        ctx.moveTo(p0.data32F[0] * scaleX, p0.data32F[1] * scaleY);
                        ctx.lineTo(p0.data32F[8 * 2] * scaleX, p0.data32F[8 * 2 + 1] * scaleY);
                        ctx.lineTo(p0.data32F[80 * 2] * scaleX, p0.data32F[80 * 2 + 1] * scaleY);
                        ctx.lineTo(p0.data32F[72 * 2] * scaleX, p0.data32F[72 * 2 + 1] * scaleY);
                        ctx.closePath();
                        ctx.stroke();

                        warpPerspectiveBoard(src, p0);
                    } else {
                        isTracked = false;
                        document.getElementById('status-indicator').className = "pulse-dot loading";
                        document.getElementById('engine-status').innerText = "CV: Поиск доски...";
                        document.getElementById('txt
