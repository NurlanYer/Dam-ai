<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dam-ai — Шашки AR</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #0d0f12; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .header { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: rgba(0, 0, 0, 0.75); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 18px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 5px; text-decoration: none; }
        
        .ai-status { background: rgba(0, 0, 0, 0.75); border: 1px solid rgba(0, 255, 102, 0.3); padding: 8px 16px; border-radius: 20px; color: #00ff66; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .pulse-dot { width: 8px; height: 8px; background-color: #00ff66; border-radius: 50%; animation: pulse 1.5s infinite; }
        .pulse-dot.loading { background-color: #ffcc00; animation: pulse 1s infinite; }
        .pulse-dot.error { background-color: #ff3333; animation: none; }
        
        .hint { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.85); color: #fff; padding: 12px 24px; border-radius: 24px; font-size: 0.9rem; text-align: center; max-width: 90%; line-height: 1.4; border: 1px solid rgba(255,255,255,0.1); }
        
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.7); }
            70% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 6px rgba(0, 255, 102, 0); }
            100% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 255, 102, 0); }
        }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>
    
    <canvas id="canvas-layer"></canvas>

    <div class="hud">
        <div class="header">
            <a href="./" class="btn interactive">← Меню</a>
            <div class="ai-status">
                <div id="status-indicator" class="pulse-dot loading"></div>
                <span id="engine-status">CV: Загрузка ИИ-зрения...</span>
            </div>
        </div>
        <div class="hint" id="txt-hint">Инициализация камеры и модулей автоопределения доски...</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas-layer');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('webcam');
        
        let src = null;
        let dst = null;
        let cvReady = false;
        let cameraReady = false;

        let isTracked = false;
        let oldGray = null;
        let p0 = null;
        let p1 = null;
        const boardWarpSize = 400; 

        // Матрица игры и буфер для сравнения
        let boardState = Array(8).fill(null).map(() => Array(8).fill(0));

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }, audio: false 
                });
                video.srcObject = stream;
                await new Promise((resolve) => { video.onloadedmetadata = () => { video.play().then(resolve); }; });
                cameraReady = true;
                checkReadyToStart();
            } catch (err) {
                console.error("Ошибка камеры:", err);
                document.getElementById('status-indicator').className = "pulse-dot error";
                document.getElementById('engine-status').innerText = "Ошибка камеры";
            }
        }

        var Module = { onRuntimeInitialized: function() { cvReady = true; checkReadyToStart(); } };

        function checkReadyToStart() {
            if (cvReady && cameraReady) {
                const dot = document.getElementById('status-indicator');
                dot.classList.remove('loading');
                document.getElementById('engine-status').innerText = "CV: Сканирование активно";
                
                const width = video.videoWidth || 640;
                const height = video.videoHeight || 480;
                
                src = new cv.Mat(height, width, cv.CV_8UC4);
                dst = new cv.Mat(height, width, cv.CV_8UC1);
                oldGray = new cv.Mat();
                p0 = new cv.Mat();
                p1 = new cv.Mat();
                
                requestAnimationFrame(processVideo);
            }
        }

        function filterAndStructureGrid(detectedCorners, outputPoints) {
            if (detectedCorners.rows < 81) return false;
            let pointsArray = [];
            for (let i = 0; i < detectedCorners.rows; i++) {
                pointsArray.push({ x: detectedCorners.data32F[i * 2], y: detectedCorners.data32F[i * 2 + 1] });
            }
            pointsArray.sort((a, b) => a.y - b.y);
            let rows = [];
            let currentRow = [pointsArray[0]];
            for (let i = 1; i < pointsArray.length; i++) {
                if (Math.abs(pointsArray[i].y - currentRow[0].y) < 15) {
                    currentRow.push(pointsArray[i]);
                } else {
                    rows.push(currentRow);
                    currentRow = [pointsArray[i]];
                }
            }
            rows.push(currentRow);
            let validRows = rows.filter(r => r.length >= 9);
            if (validRows.length < 9) return false;
            let finalGrid = [];
            for (let i = 0; i < 9; i++) {
                validRows[i].sort((a, b) => a.x - b.x);
                for (let j = 0; j < 9; j++) {
                    finalGrid.push(validRows[i][j].x, validRows[i][j].y);
                }
            }
            let tmpMat = cv.matFromArray(81, 1, cv.CV_32FC2, finalGrid);
            tmpMat.copyTo(outputPoints);
            tmpMat.delete();
            return true;
        }

        function warpPerspectiveBoard(srcFrame, boardCorners) {
            if(!boardCorners.data32F || boardCorners.rows < 81) return;
            let srcCoords = [boardCorners.data32F[0], boardCorners.data32F[1], boardCorners.data32F[16], boardCorners.data32F[17], boardCorners.data32F[160], boardCorners.data32F[161], boardCorners.data32F[144], boardCorners.data32F[145]];
            let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, srcCoords);
            let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, boardWarpSize, 0, boardWarpSize, boardWarpSize, 0, boardWarpSize]);
            let M = cv.getPerspectiveTransform(srcTri, dstTri);
            let warped = new cv.Mat();
            cv.warpPerspective(srcFrame, warped, M, new cv.Size(boardWarpSize, boardWarpSize));
            detectCheckersOnFlatBoard(warped);
            srcTri.delete(); dstTri.delete(); M.delete(); warped.delete();
        }

        // Оптимизированная детекция с кэшированием
        function detectCheckersOnFlatBoard(warpedMat) {
            let cellSize = boardWarpSize / 8;
            let nextState = Array(8).fill(null).map(() => Array(8).fill(0));
            let isChanged = false;

            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    if ((row + col) % 2 === 1) {
                        let rect = new cv.Rect(col * cellSize + 10, row * cellSize + 10, cellSize - 20, cellSize - 20);
                        let cellRoi = warpedMat.roi(rect);
                        let brightness = cv.mean(cellRoi)[0];

                        if (brightness < 80) nextState[row][col] = 2;
                        else if (brightness > 150) nextState[row][col] = 1;
                        else nextState[row][col] = 0;

                        if (nextState[row][col] !== boardState[row][col]) isChanged = true;
                        cellRoi.delete();
                    }
                }
            }

            if (isChanged) {
                boardState = nextState;
                calculateAndDrawMoves();
            }
        }

        function calculateAndDrawMoves() {
            // Логика отрисовки обновляется только при изменении состояния
            document.getElementById('txt-hint').innerText = "Анализ завершен. Доступные ходы подсвечены.";
            // Здесь ваша функция отрисовки drawNeonTargetCircle
        }

        initCamera();
    </script>
</body>
</html>
