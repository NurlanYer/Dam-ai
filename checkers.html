<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dam-ai AR Debug</title>
    <style>
        body, html { width: 100%; height: 100%; background: #000; margin: 0; overflow: hidden; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .hud { position: absolute; top: 20px; right: 20px; color: #0f0; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 15px; font-family: monospace; z-index: 10; }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas-layer"></canvas>
    <div class="hud" id="status">Запуск...</div>

    <script src="https://docs.opencv.org/4.5.0/opencv.js" onload="onOpenCvReady();"></script>
    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas-layer');
        const ctx = canvas.getContext('2d');
        let statusDiv = document.getElementById('status');

        function onOpenCvReady() {
            statusDiv.innerText = "OpenCV готов. Запуск камеры...";
            initCamera();
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    statusDiv.innerText = "Камера работает!";
                    processVideo();
                };
            } catch (err) {
                statusDiv.innerText = "Ошибка камеры: " + err.message;
            }
        }

        function processVideo() {
            let src = new cv.Mat(video.height, video.width, cv.CV_8UC4);
            let gray = new cv.Mat(video.height, video.width, cv.CV_8UC1);
            let cap = new cv.VideoCapture(video);

            function loop() {
                cap.read(src);
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                
                // Простая отрисовка для теста связи
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                statusDiv.innerText = "Идет захват кадров...";
                requestAnimationFrame(loop);
            }
            loop();
        }
    </script>
</body>
</html>
