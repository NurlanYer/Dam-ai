<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dam-ai — Шашки AR</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #0d0f12; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .header { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: rgba(0, 0, 0, 0.75); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 18px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 5px; text-decoration: none; }
        
        .ai-status { background: rgba(0, 0, 0, 0.75); border: 1px solid rgba(0, 255, 102, 0.3); padding: 8px 16px; border-radius: 20px; color: #00ff66; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .pulse-dot { width: 8px; height: 8px; background-color: #00ff66; border-radius: 50%; animation: pulse 1.5s infinite; }
        /* Желтый цвет для этапа загрузки */
        .pulse-dot.loading { background-color: #ffcc00; animation: pulse 1s infinite; }
        
        .hint { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.85); color: #fff; padding: 12px 24px; border-radius: 24px; font-size: 0.9rem; text-align: center; max-width: 90%; line-height: 1.4; border: 1px solid rgba(255,255,255,0.1); }
        
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.7); }
            70% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 6px rgba(0, 255, 102, 0); }
            100% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 255, 102, 0); }
        }
    </style>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" id="opencv-js"></script>
</head>
<body>

    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>
    
    <canvas id="canvas-layer"></canvas>

    <div class="hud">
        <div class="header">
            <a href="./" class="btn interactive">←  Меню</a>
            <div class="ai-status">
                <div id="status-indicator" class="pulse-dot loading"></div>
                <span id="engine-status">CV: Загрузка ИИ-зрения...</span>
            </div>
        </div>
        <div class="hint" id="txt-hint">Инициализация модулей автоопределения доски. Пожалуйста, подождите...</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas-layer');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('webcam');
        
        let src, dst, cap;
        let cvReady = false;

        // Включение камеры
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }, 
                    audio: false 
                });
                video.srcObject = stream;
                video.play();
            } catch (err) {
                console.log("Режим симуляции очков.");
            }
        }

        // Ждем пока OpenCV загрузится в браузер / очки
        document.getElementById('opencv-js').addEventListener('load', () => {
            cv['onRuntimeInitialized'] = () => {
                cvReady = true;
                
                // Переключаем статус интерфейса на "Активен"
                const dot = document.getElementById('status-indicator');
                dot.classList.remove('loading');
                document.getElementById('engine-status').innerText = "CV: Сканирование активно";
                document.getElementById('txt-hint').innerText = "Положите доску перед очками. Программа автоматически считывает контуры.";
                
                // Выделяем память под матрицы компьютерного зрения
                src = new cv.Mat(video.videoHeight || 480, video.videoWidth || 640, cv.CV_8UC4);
                dst = new cv.Mat(video.videoHeight || 480, video.videoWidth || 640, cv.CV_8UC1);
                cap = new cv.VideoCapture(video);
                
                // Запускаем непрерывный цикл распознавания
                processVideo();
            };
        });

        // Функция обработки кадра и поиска доски
        function processVideo() {
            if (!cvReady) return;

            try {
                // Читаем картинку с камеры
                cap.read(src);
                
                // Переводим в черно-белый формат для анализа контуров
                cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
                cv.adaptiveThreshold(dst, dst, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);

                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                
                // Ищем контуры объектов на столе
                cv.findContours(dst, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let maxArea = 0;
                let boardContourIndex = -1;

                // Перебираем контуры, чтобы автоматически зацепить самый большой четырехугольник (доску)
                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);
                    let perimeter = cv.arcLength(cnt, true);
                    let approx = new cv.Mat();
                    
                    cv.approxPolyDP(cnt, approx, 0.02 * perimeter, true);

                    // Если объект имеет 4 угла и он достаточно крупный
                    if (approx.rows === 4 && area > 9000 && area > maxArea) {
                        maxArea = area;
                        boardContourIndex = i;
                    }
                    approx.delete();
                }

                // Логика отрисовки AR подсказок
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Если автоматика нашла доску на столе, подсвечиваем её контур
                if (boardContourIndex !== -1) {
                    let boardContour = contours.get(boardContourIndex);
                    
                    ctx.strokeStyle = "#00ff66";
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    
                    for (let j = 0; j < 4; j++) {
                        let x = boardContour.data32S[j * 2] * (canvas.width / src.cols);
                        let y = boardContour.data32S[j * 2 + 1] * (canvas.height / src.rows);
                        if (j === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                }

                // Чистим память процесса
                contours.delete();
                hierarchy.delete();

            } catch (err) {
                console.log("Ожидание готовности видеопотока...");
            }

            // Запрашиваем следующий кадр через 30мс (около 30 кадров в секунду)
            setTimeout(processVideo, 33);
        }

        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
        }
        
        window.addEventListener('resize', resize);
        resize();
        
        initCamera();
    </script>
</body>
</html>
