<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dam-ai AR Full Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .hud { position: absolute; top: 20px; right: 20px; color: #0f0; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 15px; pointer-events: none; z-index: 10; font-family: monospace; }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas-layer"></canvas>
    <div class="hud" id="status">Загрузка OpenCV...</div>

    <script src="https://docs.opencv.org/4.5.0/opencv.js" onload="init();"></script>
    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas-layer');
        const ctx = canvas.getContext('2d');
        let src, gray, prevGray, corners, prevCorners, statusMat, errMat;
        let isTracking = false;

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                await video.play();
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                // Инициализация матриц OpenCV
                src = new cv.Mat(video.height, video.width, cv.CV_8UC4);
                gray = new cv.Mat(video.height, video.width, cv.CV_8UC1);
                prevGray = new cv.Mat(video.height, video.width, cv.CV_8UC1);
                corners = new cv.Mat();
                statusMat = new cv.Mat();
                errMat = new cv.Mat();
                
                requestAnimationFrame(loop);
            } catch (err) {
                document.getElementById('status').innerText = "Ошибка: " + err.message;
            }
        }

        function loop() {
            let cap = new cv.VideoCapture(video);
            cap.read(src);
            
            // Адаптивный порог для работы при разном освещении
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
            cv.adaptiveThreshold(gray, gray, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY, 11, 2);

            if (!isTracking) {
                // Поиск доски (тяжелая операция)
                let found = cv.findChessboardCorners(gray, new cv.Size(7, 7), corners);
                if (found) {
                    isTracking = true;
                    prevCorners = corners.clone();
                    gray.copyTo(prevGray);
                    document.getElementById('status').innerText = "Статус: TRACKING ACTIVE";
                } else {
                    document.getElementById('status').innerText = "Статус: ПОИСК ДОСКИ...";
                }
            } else {
                // Optical Flow: ведение доски в движении
                let nextCorners = new cv.Mat();
                cv.calcOpticalFlowPyrLK(prevGray, gray, prevCorners, nextCorners, statusMat, errMat);
                
                // Визуализация трекинга
                drawTracking(nextCorners);
                
                // Обновление состояния для следующего кадра
                prevCorners.delete();
                prevCorners = nextCorners.clone();
                gray.copyTo(prevGray);
            }
            requestAnimationFrame(loop);
        }

        function drawTracking(pts) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let data = pts.data32F;
            ctx.strokeStyle = '#00FF00';
            ctx.lineWidth = 3;
            for (let i = 0; i < data.length; i += 2) {
                ctx.beginPath();
                ctx.arc(data[i], data[i+1], 5, 0, 2 * Math.PI);
                ctx.stroke();
            }
        }
    </script>
</body>
</html>
