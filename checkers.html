<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dam-ai Diagnostics</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #overlay { position: absolute; top: 10px; right: 10px; background: #222; padding: 20px; border: 1px solid #0f0; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div id="overlay">Статус: <span id="status">Инициализация...</span></div>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas-layer"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.min.js" onload="onOpenCvReady();" onerror="onOpenCvError();"></script>
    
    <script>
        const status = document.getElementById('status');
        
        function onOpenCvError() {
            status.innerText = "Ошибка загрузки библиотеки!";
            console.error("OpenCV не загрузился!");
        }

        function onOpenCvReady() {
            status.innerText = "OpenCV загружен. Запрос камеры...";
            console.log("OpenCV version:", cv.version);
            initCamera();
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('webcam');
                video.srcObject = stream;
                status.innerText = "Камера активна.";
                // Если дошли сюда, значит все работает
            } catch (err) {
                status.innerText = "Камера недоступна: " + err.name;
            }
        }
    </script>
</body>
</html>
