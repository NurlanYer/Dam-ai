<!DOCTYPE html>
<html>
<body style="background:black; color:white; font-family:sans-serif;">
    <div id="log" style="padding:20px; font-size: 20px;">Запуск теста...</div>
    <video id="v" autoplay playsinline style="width:100%;"></video>

    <script>
        const log = document.getElementById('log');
        const v = document.getElementById('v');

        async function test() {
            try {
                log.innerText = "Запрос камеры...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                v.srcObject = stream;
                log.innerText = "Камера получена! Успех.";
                log.style.color = "#0f0";
            } catch (e) {
                log.innerText = "Ошибка: " + e.message;
                log.style.color = "red";
                console.error(e);
            }
        }
        test();
    </script>
</body>
</html>
